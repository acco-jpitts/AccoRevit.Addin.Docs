  langs:
  - csharp
  - vb
  name: GetTitleBlockTypeByName(Document, string)
  nameWithType: Collector.GetTitleBlockTypeByName(Document, string)
  fullName: AccoRevit.Addin.Utils.Collector.GetTitleBlockTypeByName(Autodesk.Revit.DB.Document, string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Gets the title block type (symbol) by name.
  remarks: >-
    <p>

    Intended to return the type (symbol) associated with a title block named <code class="paramref">titleBlockName</code>.

    </p>

    <p>

    Note: the current implementation collects <xref href="Autodesk.Revit.DB.FamilyInstance" data-throw-if-not-resolved="false"></xref> elements and casts the result to

    <xref href="Autodesk.Revit.DB.FamilySymbol" data-throw-if-not-resolved="false"></xref>, which will return <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>. To return a symbol, query

    <xref href="Autodesk.Revit.DB.FamilySymbol" data-throw-if-not-resolved="false"></xref> elements (or resolve <code>GetTypeId()</code> from an instance) instead.

    </p>
  example: []
  syntax:
    content: public static FamilySymbol GetTitleBlockTypeByName(this Document doc, string titleBlockName)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The Revit document to search.
    - id: titleBlockName
      type: System.String
      description: Exact title block type name (symbol name) to match.

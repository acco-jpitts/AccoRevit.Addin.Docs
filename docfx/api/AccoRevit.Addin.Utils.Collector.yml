    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The Revit document to search.
    - id: worksetName
      type: System.String
      description: Exact workset name to match.
    return:
      type: Autodesk.Revit.DB.Workset
      description: The matching <xref href="Autodesk.Revit.DB.Workset" data-throw-if-not-resolved="false"></xref>, or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> if not found.

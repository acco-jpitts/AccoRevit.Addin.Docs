  namespace: AccoRevit.Addin.Utils
  summary: Gets the first user workset whose name equals the specified value.
  remarks: >-
    <p>

    Only user worksets (<xref href="Autodesk.Revit.DB.WorksetKind.UserWorkset" data-throw-if-not-resolved="false"></xref>) are considered.

    </p>

    <p>

    The current comparison is case-sensitive (<code>workset.Name == worksetName</code>). If you want case-insensitive behavior,

    use <code>string.Equals(workset.Name, worksetName, StringComparison.OrdinalIgnoreCase)</code>.

    </p>

  commentId: M:AccoRevit.Addin.Utils.Collector.GetTitleBlockTypeByName(Autodesk.Revit.DB.Document,System.String)
  id: GetTitleBlockTypeByName(Autodesk.Revit.DB.Document,System.String)
  isExtensionMethod: true

    If multiple assemblies share the same type name (case-insensitive), <xref href="System.Linq.Enumerable.ToDictionary%60%603(System.Collections.Generic.IEnumerable%7b%60%600%7d%2cSystem.Func%7b%60%600%2c%60%601%7d%2cSystem.Func%7b%60%600%2c%60%602%7d)" data-throw-if-not-resolved="false"></xref> will throw.

    </p>

- uid: AccoRevit.Addin.Utils.Collector.GetViewTemplateByName(Autodesk.Revit.DB.Document,System.String)
  commentId: M:AccoRevit.Addin.Utils.Collector.GetViewTemplateByName(Autodesk.Revit.DB.Document,System.String)
  id: GetViewTemplateByName(Autodesk.Revit.DB.Document,System.String)
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.Collector
  langs:
  - csharp
  - vb
  name: GetViewTemplateByName(Document, string)
  nameWithType: Collector.GetViewTemplateByName(Document, string)
  fullName: AccoRevit.Addin.Utils.Collector.GetViewTemplateByName(Autodesk.Revit.DB.Document, string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Gets the first view template in the document whose name equals the specified value (case-insensitive).
  remarks: Searches all <xref href="Autodesk.Revit.DB.View" data-throw-if-not-resolved="false"></xref> elements and filters to <xref href="Autodesk.Revit.DB.View.IsTemplate" data-throw-if-not-resolved="false"></xref> views only.
  example: []
  syntax:
    content: public static View GetViewTemplateByName(this Document doc, string templateName)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The Revit document to search.
    - id: templateName
      type: System.String
      description: Exact template name to match.
    return:
      type: Autodesk.Revit.DB.View
      description: The matching view template, or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> if none is found.
    content.vb: Public Shared Function GetViewTemplateByName(doc As Document, templateName As String) As View

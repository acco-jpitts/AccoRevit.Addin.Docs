  - AccoRevit.Addin.Services.XmlService.SaveXmlAsync(System.Xml.Linq.XDocument,System.String,System.Threading.CancellationToken)
  langs:
  - csharp
  - vb
  name: XmlService
  nameWithType: XmlService
  fullName: AccoRevit.Addin.Services.XmlService
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Services
  summary: >-
    Provides asynchronous load/save operations for XML documents (<xref href="System.Xml.Linq.XDocument" data-throw-if-not-resolved="false"></xref>) with cross-target support for

    <code>net48</code> and modern .NET runtimes.
  remarks: >-
    <p>

    <xref href="AccoRevit.Addin.Services.XmlService.LoadXmlAsync(System.String%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> opens the file with <xref href="System.IO.FileShare.ReadWrite" data-throw-if-not-resolved="false"></xref> to allow reading XML that may be open

    or being written by other processes. Line information is preserved via <xref href="System.Xml.Linq.LoadOptions.SetLineInfo" data-throw-if-not-resolved="false"></xref> to improve

    diagnostics and error reporting.

    </p>

    <p>

    <xref href="AccoRevit.Addin.Services.XmlService.SaveXmlAsync(System.Xml.Linq.XDocument%2cSystem.String%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> writes to a temporary file and then atomically replaces/moves the destination. This reduces

    the risk of leaving a partially written XML file when an error or cancellation occurs.

    </p>

    <p>

    On modern runtimes (non-<code>NET48</code>), the implementation uses async readers/writers and prohibits DTD processing to

    reduce XML-related security risks.

    </p>
  example: []
  syntax:

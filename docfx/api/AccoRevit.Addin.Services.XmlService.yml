- uid: AccoRevit.Addin.Services.XmlService.LoadXmlAsync(System.String,System.Threading.CancellationToken)
  commentId: M:AccoRevit.Addin.Services.XmlService.LoadXmlAsync(System.String,System.Threading.CancellationToken)
  id: LoadXmlAsync(System.String,System.Threading.CancellationToken)
  parent: AccoRevit.Addin.Services.XmlService
  langs:
  - csharp
  - vb
  name: LoadXmlAsync(string, CancellationToken)
  nameWithType: XmlService.LoadXmlAsync(string, CancellationToken)
  fullName: AccoRevit.Addin.Services.XmlService.LoadXmlAsync(string, System.Threading.CancellationToken)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Services
  summary: Loads an XML document from disk.
  remarks: >-
    <p>

    The file is opened with <xref href="System.IO.FileShare.ReadWrite" data-throw-if-not-resolved="false"></xref> to allow reading XML that may be open

    or being written by other processes. Line information is preserved via <xref href="System.Xml.Linq.LoadOptions.SetLineInfo" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    On <code>NET48</code>, this method loads synchronously using

    <xref href="System.Xml.Linq.XDocument.Load(System.IO.Stream%2cSystem.Xml.Linq.LoadOptions)" data-throw-if-not-resolved="false"></xref> due to framework limitations.

    </p>

    <p>

    On modern runtimes, this method loads asynchronously using

    <xref href="System.Xml.Linq.XDocument.LoadAsync(System.Xml.XmlReader%2cSystem.Xml.Linq.LoadOptions%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>

    with <xref href="System.Xml.XmlReaderSettings.Async" data-throw-if-not-resolved="false"></xref> enabled and DTD processing prohibited.

    </p>
  example: []
  syntax:
    content: public Task<XDocument> LoadXmlAsync(string filePath, CancellationToken ct = default)
    parameters:
    - id: filePath
      type: System.String
      description: Path to the XML file to load.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.Xml.Linq.XDocument}
      description: The loaded <xref href="System.Xml.Linq.XDocument" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Function LoadXmlAsync(filePath As String, ct As CancellationToken = Nothing) As Task(Of XDocument)
  overload: AccoRevit.Addin.Services.XmlService.LoadXmlAsync*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">filePath</code> is null/empty/whitespace.
  - type: Autodesk.Revit.Exceptions.OperationCanceledException
    commentId: T:Autodesk.Revit.Exceptions.OperationCanceledException
    description: Thrown when cancellation is requested.
  implements:
  - AccoRevit.Addin.Interfaces.IXmlService.LoadXmlAsync(System.String,System.Threading.CancellationToken)
  nameWithType.vb: XmlService.LoadXmlAsync(String, CancellationToken)
  fullName.vb: AccoRevit.Addin.Services.XmlService.LoadXmlAsync(String, System.Threading.CancellationToken)
  name.vb: LoadXmlAsync(String, CancellationToken)
- uid: AccoRevit.Addin.Services.XmlService.SaveXmlAsync(System.Xml.Linq.XDocument,System.String,System.Threading.CancellationToken)
  commentId: M:AccoRevit.Addin.Services.XmlService.SaveXmlAsync(System.Xml.Linq.XDocument,System.String,System.Threading.CancellationToken)
  id: SaveXmlAsync(System.Xml.Linq.XDocument,System.String,System.Threading.CancellationToken)
  parent: AccoRevit.Addin.Services.XmlService
  langs:
  - csharp
  - vb
  name: SaveXmlAsync(XDocument, string, CancellationToken)
  nameWithType: XmlService.SaveXmlAsync(XDocument, string, CancellationToken)
  fullName: AccoRevit.Addin.Services.XmlService.SaveXmlAsync(System.Xml.Linq.XDocument, string, System.Threading.CancellationToken)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Services
  summary: Saves an XML document to disk using a temporary file and atomic replace/move.
  remarks: >-
    <p>

    The destination directory is created if it does not exist.

    </p>

    <p>

    The file is written to <code>{filePath}.tmp</code> first. If the destination exists, it is replaced using

    <xref href="System.IO.File.Replace(System.String%2cSystem.String%2cSystem.String)" data-throw-if-not-resolved="false"></xref>; otherwise, the temp file is moved into place.

    </p>

    <p>

    The temp file is deleted in a <code>finally</code> block as best-effort cleanup.

    </p>
  example: []
  syntax:
    content: public Task SaveXmlAsync(XDocument doc, string filePath, CancellationToken ct = default)
    parameters:
    - id: doc
      type: System.Xml.Linq.XDocument
      description: The document to save.
    - id: filePath
      type: System.String
      description: Destination file path.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task
    content.vb: Public Function SaveXmlAsync(doc As XDocument, filePath As String, ct As CancellationToken = Nothing) As Task
  overload: AccoRevit.Addin.Services.XmlService.SaveXmlAsync*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">doc</code> is null or <code class="paramref">filePath</code> is null/empty/whitespace.
  - type: Autodesk.Revit.Exceptions.OperationCanceledException
    commentId: T:Autodesk.Revit.Exceptions.OperationCanceledException
    description: Thrown when cancellation is requested.
  implements:
  - AccoRevit.Addin.Interfaces.IXmlService.SaveXmlAsync(System.Xml.Linq.XDocument,System.String,System.Threading.CancellationToken)
  nameWithType.vb: XmlService.SaveXmlAsync(XDocument, String, CancellationToken)
  fullName.vb: AccoRevit.Addin.Services.XmlService.SaveXmlAsync(System.Xml.Linq.XDocument, String, System.Threading.CancellationToken)
  name.vb: SaveXmlAsync(XDocument, String, CancellationToken)

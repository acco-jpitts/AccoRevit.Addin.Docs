- uid: AccoRevit.Addin.Utils.TagFamilyCatalogService
  commentId: T:AccoRevit.Addin.Utils.TagFamilyCatalogService
  id: TagFamilyCatalogService
  parent: AccoRevit.Addin.Utils
  children:
  - AccoRevit.Addin.Utils.TagFamilyCatalogService.#ctor
  - AccoRevit.Addin.Utils.TagFamilyCatalogService.GetFamilyNames(System.Boolean)
  - AccoRevit.Addin.Utils.TagFamilyCatalogService.ResolveFamilyPath(System.String)
  langs:
  - csharp
  - vb
  name: TagFamilyCatalogService
  nameWithType: TagFamilyCatalogService
  fullName: AccoRevit.Addin.Utils.TagFamilyCatalogService
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: >-
    Builds and maintains an in-memory catalog of Revit tag family files (<code>.rfa</code>) discovered under one or more

    configured root directories. The catalog maps a family name (file name without extension) to its full file path,

    enabling fast lookup for UI picklists and family loading workflows.
  remarks: >-
    <p>

    The catalog is constructed by recursively scanning each configured root in <xref href="AccoRevit.Addin.Utils.TagFamilyCatalogService.SearchRoots" data-throw-if-not-resolved="false"></xref> for

    <code>*.rfa</code> files. Results are stored in a case-insensitive map (<xref href="AccoRevit.Addin.Utils.TagFamilyCatalogService._familyMap" data-throw-if-not-resolved="false"></xref>).

    </p>

    <p>

    If multiple files share the same family name across different roots, the first discovered path wins and subsequent

    duplicates are ignored.

    </p>

    <p>

    File system enumeration errors are intentionally swallowed to keep the calling workflow resilient in environments

    where some roots may be missing or inaccessible.

    </p>
  example: []
  syntax:
    content: public class TagFamilyCatalogService
    content.vb: Public Class TagFamilyCatalogService

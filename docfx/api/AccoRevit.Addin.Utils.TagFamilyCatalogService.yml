- uid: AccoRevit.Addin.Utils.TagFamilyCatalogService.GetFamilyNames(System.Boolean)
  commentId: M:AccoRevit.Addin.Utils.TagFamilyCatalogService.GetFamilyNames(System.Boolean)
  id: GetFamilyNames(System.Boolean)
  parent: AccoRevit.Addin.Utils.TagFamilyCatalogService
  langs:
  - csharp
  - vb
  name: GetFamilyNames(bool)
  nameWithType: TagFamilyCatalogService.GetFamilyNames(bool)
  fullName: AccoRevit.Addin.Utils.TagFamilyCatalogService.GetFamilyNames(bool)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Gets an alphabetically sorted list of discovered family names.
  remarks: >-
    This method builds the catalog lazily if it has not been built yet, or rebuilds it when <code class="paramref">refresh</code>

    is requested.
  example: []
  syntax:
    content: public IReadOnlyList<string> GetFamilyNames(bool refresh = false)
    parameters:
    - id: refresh
      type: System.Boolean
      description: >-
        When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, forces a rebuild of the catalog by re-scanning the configured roots.

        When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>, the catalog is built on first use and then reused for subsequent calls.
    return:
      type: System.Collections.Generic.IReadOnlyList{System.String}
      description: A read-only list of family names (file names without extension) discovered under the configured search roots.
    content.vb: Public Function GetFamilyNames(refresh As Boolean = False) As IReadOnlyList(Of String)
  overload: AccoRevit.Addin.Utils.TagFamilyCatalogService.GetFamilyNames*
  nameWithType.vb: TagFamilyCatalogService.GetFamilyNames(Boolean)
  fullName.vb: AccoRevit.Addin.Utils.TagFamilyCatalogService.GetFamilyNames(Boolean)
  name.vb: GetFamilyNames(Boolean)
- uid: AccoRevit.Addin.Utils.TagFamilyCatalogService.ResolveFamilyPath(System.String)
  commentId: M:AccoRevit.Addin.Utils.TagFamilyCatalogService.ResolveFamilyPath(System.String)
  id: ResolveFamilyPath(System.String)
  parent: AccoRevit.Addin.Utils.TagFamilyCatalogService
  langs:
  - csharp
  - vb
  name: ResolveFamilyPath(string)
  nameWithType: TagFamilyCatalogService.ResolveFamilyPath(string)
  fullName: AccoRevit.Addin.Utils.TagFamilyCatalogService.ResolveFamilyPath(string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Resolves a family name to its full <code>.rfa</code> file path, if present in the catalog.
  remarks: The catalog is built lazily on first use. Lookups are case-insensitive.
  example: []
  syntax:
    content: public string ResolveFamilyPath(string familyName)
    parameters:
    - id: familyName
      type: System.String
      description: >-
        The family name to resolve. This is expected to be the file name without the <code>.rfa</code> extension.

        Leading/trailing whitespace is ignored.
    return:
      type: System.String
      description: The full path to the matching <code>.rfa</code> file if found; otherwise, an empty string.
    content.vb: Public Function ResolveFamilyPath(familyName As String) As String

- uid: AccoRevit.Addin.Utils.AnnotationUtils.ComputeTagHeadPoint(Autodesk.Revit.DB.Element,Autodesk.Revit.DB.View,AccoRevit.Addin.Models.AnnotationRule)
  commentId: M:AccoRevit.Addin.Utils.AnnotationUtils.ComputeTagHeadPoint(Autodesk.Revit.DB.Element,Autodesk.Revit.DB.View,AccoRevit.Addin.Models.AnnotationRule)
  id: ComputeTagHeadPoint(Autodesk.Revit.DB.Element,Autodesk.Revit.DB.View,AccoRevit.Addin.Models.AnnotationRule)
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.AnnotationUtils
  langs:
  - csharp
  - vb
  name: ComputeTagHeadPoint(Element, View, AnnotationRule)
  nameWithType: AnnotationUtils.ComputeTagHeadPoint(Element, View, AnnotationRule)
  fullName: AccoRevit.Addin.Utils.AnnotationUtils.ComputeTagHeadPoint(Autodesk.Revit.DB.Element, Autodesk.Revit.DB.View, AccoRevit.Addin.Models.AnnotationRule)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: >-
    Computes the tag head point for an element in a given view based on its bounding box, a placement anchor,

    and configured X/Y offsets.
  remarks: >-
    <p>

    The method projects the element bounding box extents onto the view's <xref href="Autodesk.Revit.DB.View.RightDirection" data-throw-if-not-resolved="false"></xref> and

    <xref href="Autodesk.Revit.DB.View.UpDirection" data-throw-if-not-resolved="false"></xref> axes to compute a 2D anchor in the view plane.

    </p>

    <p>

    XML offsets are treated as paper offsets and converted to model feet using <code>view.Scale</code> and

    <xref href="AccoRevit.Addin.Utils.AnnotationUtils.XmlOffsetToModelFeetAtScale1" data-throw-if-not-resolved="false"></xref>.

    </p>
  example: []
  syntax:
    content: public static XYZ ComputeTagHeadPoint(this Element element, View view, AnnotationRule rule)
    parameters:
    - id: element
      type: Autodesk.Revit.DB.Element
      description: Element being tagged.
    - id: view
      type: Autodesk.Revit.DB.View
      description: View in which the tag will be placed.
    - id: rule
      type: AccoRevit.Addin.Models.AnnotationRule
      description: Rule defining placement position and offsets.
    return:
      type: Autodesk.Revit.DB.XYZ
      description: The computed tag head point in model coordinates, or <xref href="Autodesk.Revit.DB.XYZ.Zero" data-throw-if-not-resolved="false"></xref> when a bounding box cannot be obtained.
    content.vb: Public Shared Function ComputeTagHeadPoint(element As Element, view As View, rule As AnnotationRule) As XYZ
  overload: AccoRevit.Addin.Utils.AnnotationUtils.ComputeTagHeadPoint*

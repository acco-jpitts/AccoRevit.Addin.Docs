  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Builds a stable cache key for resolving/loading a tag family symbol for a rule.
  example: []
  syntax:
    content: public static string GetRuleKey(this AnnotationRule rule)
    parameters:
    - id: rule
      type: AccoRevit.Addin.Models.AnnotationRule
      description: The annotation rule.
    return:
      type: System.String
      description: >-
        <p>

        A key of the form <code>{FamilyName}</code> when the type is empty or <code>(Autodetect)</code>, otherwise

        <code>{FamilyName}:{FamilyType}</code>. Returns an empty string when <code class="paramref">rule</code> or the family name is missing.

        </p>
    content.vb: Public Shared Function GetRuleKey(rule As AnnotationRule) As String
  overload: AccoRevit.Addin.Utils.AnnotationUtils.GetRuleKey*

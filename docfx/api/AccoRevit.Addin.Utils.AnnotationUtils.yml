  name: AnnotationUtils
  nameWithType: AnnotationUtils
  fullName: AccoRevit.Addin.Utils.AnnotationUtils
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Extension methods that support XML-driven annotation rule matching and tag placement.
  remarks: >-
    <p>

    This class provides:


    <ul><li>Rule matching helpers (category and fabrication service type).</li><li>Rule key generation for caching family symbols.</li><li>Safe leader toggling for <xref href="IndependentTag" data-throw-if-not-resolved="false"></xref>.</li><li>Tag head point computation from an element's bounding box, view orientation, and XML offsets.</li></ul>

    </p>

    <p>

    Offsets from XML are interpreted in "paper" units and converted to model feet using view scale

    (see <xref href="AccoRevit.Addin.Utils.AnnotationUtils.XmlOffsetToModelFeetAtScale1" data-throw-if-not-resolved="false"></xref>).

    </p>
  example: []
  syntax:
    content: public static class AnnotationUtils
    content.vb: Public Module AnnotationUtils

- uid: AccoRevit.Addin.Utils.AnnotationUtils.TrySetLeader(Autodesk.Revit.DB.IndependentTag,System.Boolean)
  commentId: M:AccoRevit.Addin.Utils.AnnotationUtils.TrySetLeader(Autodesk.Revit.DB.IndependentTag,System.Boolean)
  id: TrySetLeader(Autodesk.Revit.DB.IndependentTag,System.Boolean)
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.AnnotationUtils
  langs:
  - csharp
  - vb
  name: TrySetLeader(IndependentTag, bool)
  nameWithType: AnnotationUtils.TrySetLeader(IndependentTag, bool)
  fullName: AccoRevit.Addin.Utils.AnnotationUtils.TrySetLeader(Autodesk.Revit.DB.IndependentTag, bool)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Attempts to set the leader visibility for a tag, suppressing API exceptions.
  remarks: >-
    Some tag contexts or Revit versions can throw when setting <xref href="Autodesk.Revit.DB.IndependentTag.HasLeader" data-throw-if-not-resolved="false"></xref>; this helper

    intentionally swallows those exceptions to keep placement resilient.
  example: []
  syntax:
    content: public static void TrySetLeader(this IndependentTag tag, bool showLeader)
    parameters:
    - id: tag
      type: Autodesk.Revit.DB.IndependentTag
      description: The tag to modify.
    - id: showLeader
      type: System.Boolean
      description: Whether a leader should be enabled.
    content.vb: Public Shared Sub TrySetLeader(tag As IndependentTag, showLeader As Boolean)
  overload: AccoRevit.Addin.Utils.AnnotationUtils.TrySetLeader*

  name: MissingResourcesLoader
  nameWithType: MissingResourcesLoader
  fullName: AccoRevit.Addin.Utils.MissingResourcesLoader
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: >-
    Detects missing Revit resources (view templates, schedule templates, families, and tag families) and provides helpers

    to load/copy them from known sources (disk and container models).
  remarks: >-
    This class is intended for “bootstrap” workflows where a project model must be aligned to a standard resource set.

    It can:


    <ul><li>Compare the active document against predefined resource names.</li><li>Load missing families from file paths.</li><li>Copy missing templates/schedules from a container model using copy/paste.</li></ul>


    Errors encountered during loading/copying are accumulated and can be displayed at the end of the workflow.

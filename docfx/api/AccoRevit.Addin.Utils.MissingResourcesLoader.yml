- uid: AccoRevit.Addin.Utils.MissingResourcesLoader.FindMissing(System.Collections.Generic.ICollection{System.String},System.Collections.Generic.ICollection{System.String},System.Collections.Generic.Dictionary{System.String,System.String},System.Collections.Generic.Dictionary{System.String,System.String})
  commentId: M:AccoRevit.Addin.Utils.MissingResourcesLoader.FindMissing(System.Collections.Generic.ICollection{System.String},System.Collections.Generic.ICollection{System.String},System.Collections.Generic.Dictionary{System.String,System.String},System.Collections.Generic.Dictionary{System.String,System.String})
  id: FindMissing(System.Collections.Generic.ICollection{System.String},System.Collections.Generic.ICollection{System.String},System.Collections.Generic.Dictionary{System.String,System.String},System.Collections.Generic.Dictionary{System.String,System.String})
  parent: AccoRevit.Addin.Utils.MissingResourcesLoader
  langs:
  - csharp
  - vb
  name: FindMissing(ICollection<string>, ICollection<string>, Dictionary<string, string>, Dictionary<string, string>)
  nameWithType: MissingResourcesLoader.FindMissing(ICollection<string>, ICollection<string>, Dictionary<string, string>, Dictionary<string, string>)
  fullName: AccoRevit.Addin.Utils.MissingResourcesLoader.FindMissing(System.Collections.Generic.ICollection<string>, System.Collections.Generic.ICollection<string>, System.Collections.Generic.Dictionary<string, string>, System.Collections.Generic.Dictionary<string, string>)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Compares the document against predefined resource names and returns the missing items.
  remarks: >-
    <p>

    View templates are collected from <xref href="Autodesk.Revit.DB.View" data-throw-if-not-resolved="false"></xref> elements where <xref href="Autodesk.Revit.DB.View.IsTemplate" data-throw-if-not-resolved="false"></xref> is true and the

    view is not a <xref href="Autodesk.Revit.DB.ViewSchedule" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    Schedule templates are collected from <xref href="Autodesk.Revit.DB.ViewSchedule" data-throw-if-not-resolved="false"></xref> elements where <xref href="Autodesk.Revit.DB.View.IsTemplate" data-throw-if-not-resolved="false"></xref>

    is true.

    </p>

    <p>

    Loaded families/tags are collected from all <xref href="Autodesk.Revit.DB.FamilySymbol" data-throw-if-not-resolved="false"></xref> elements in the document. Tags are inferred

    as families whose symbol category is <xref href="Autodesk.Revit.DB.CategoryType.Annotation" data-throw-if-not-resolved="false"></xref>.

    </p>
  example: []
  syntax:
    content: public (HashSet<string> Templates, HashSet<string> Schedules, HashSet<string> Families, HashSet<string> Tags) FindMissing(ICollection<string> predefinedTemplates, ICollection<string> predefinedSchedules, Dictionary<string, string> predefinedFamilies = null, Dictionary<string, string> predefinedTags = null)
    parameters:
    - id: predefinedTemplates
      type: System.Collections.Generic.ICollection{System.String}
      description: Expected view template names (non-schedule templates).
    - id: predefinedSchedules
      type: System.Collections.Generic.ICollection{System.String}
      description: Expected schedule template names.
    - id: predefinedFamilies
      type: System.Collections.Generic.Dictionary{System.String,System.String}
      description: Expected family names mapped to file paths. Only the keys (family names) are checked for presence.
    - id: predefinedTags
      type: System.Collections.Generic.Dictionary{System.String,System.String}
      description: Expected tag family names mapped to file paths. Only annotation-category families are treated as tags.
    return:
      type: System.ValueTuple{System.Collections.Generic.HashSet{System.String},System.Collections.Generic.HashSet{System.String},System.Collections.Generic.HashSet{System.String},System.Collections.Generic.HashSet{System.String}}
      description: 'A tuple of missing resource names: (Templates, Schedules, Families, Tags).'
    content.vb: Public Function FindMissing(predefinedTemplates As ICollection(Of String), predefinedSchedules As ICollection(Of String), predefinedFamilies As Dictionary(Of String, String) = Nothing, predefinedTags As Dictionary(Of String, String) = Nothing) As (Templates As HashSet(Of String), Schedules As HashSet(Of String), Families As HashSet(Of String), Tags As HashSet(Of String))
  overload: AccoRevit.Addin.Utils.MissingResourcesLoader.FindMissing*
  nameWithType.vb: MissingResourcesLoader.FindMissing(ICollection(Of String), ICollection(Of String), Dictionary(Of String, String), Dictionary(Of String, String))
  fullName.vb: AccoRevit.Addin.Utils.MissingResourcesLoader.FindMissing(System.Collections.Generic.ICollection(Of String), System.Collections.Generic.ICollection(Of String), System.Collections.Generic.Dictionary(Of String, String), System.Collections.Generic.Dictionary(Of String, String))
  name.vb: FindMissing(ICollection(Of String), ICollection(Of String), Dictionary(Of String, String), Dictionary(Of String, String))

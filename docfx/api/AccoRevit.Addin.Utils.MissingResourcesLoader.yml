  name: LoadFamilies(Dictionary<string, string>, ICollection<string>, Document)
  nameWithType: MissingResourcesLoader.LoadFamilies(Dictionary<string, string>, ICollection<string>, Document)
  fullName: AccoRevit.Addin.Utils.MissingResourcesLoader.LoadFamilies(System.Collections.Generic.Dictionary<string, string>, System.Collections.Generic.ICollection<string>, Autodesk.Revit.DB.Document)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Loads the specified missing family names from disk using a name-to-path map.
  remarks: >-
    This method delegates loading to <code>GetOrLoadFamilySymbols</code> and verifies that each requested name resolves to a

    non-null symbol entry in the returned dictionary.
  example: []
  syntax:
    content: public void LoadFamilies(Dictionary<string, string> sourceMap, ICollection<string> missingNames, Document doc)
    parameters:
    - id: sourceMap
      type: System.Collections.Generic.Dictionary{System.String,System.String}
      description: Map of family name to family file path (<code>.rfa</code>).
    - id: missingNames
      type: System.Collections.Generic.ICollection{System.String}
      description: Family names to load.
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: Target document into which families should be loaded.
    content.vb: Public Sub LoadFamilies(sourceMap As Dictionary(Of String, String), missingNames As ICollection(Of String), doc As Document)
  overload: AccoRevit.Addin.Utils.MissingResourcesLoader.LoadFamilies*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown when one or more requested families fail to load.

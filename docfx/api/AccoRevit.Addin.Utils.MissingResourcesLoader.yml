- uid: AccoRevit.Addin.Utils.MissingResourcesLoader.LoadTemplatesAndSchedulesFromContainer(AccoRevit.Addin.Enums.ContainerSource,System.Collections.Generic.ICollection{System.String},System.Collections.Generic.ICollection{System.String})
  commentId: M:AccoRevit.Addin.Utils.MissingResourcesLoader.LoadTemplatesAndSchedulesFromContainer(AccoRevit.Addin.Enums.ContainerSource,System.Collections.Generic.ICollection{System.String},System.Collections.Generic.ICollection{System.String})
  id: LoadTemplatesAndSchedulesFromContainer(AccoRevit.Addin.Enums.ContainerSource,System.Collections.Generic.ICollection{System.String},System.Collections.Generic.ICollection{System.String})
  parent: AccoRevit.Addin.Utils.MissingResourcesLoader
  langs:
  - csharp
  - vb
  name: LoadTemplatesAndSchedulesFromContainer(ContainerSource, ICollection<string>, ICollection<string>)
  nameWithType: MissingResourcesLoader.LoadTemplatesAndSchedulesFromContainer(ContainerSource, ICollection<string>, ICollection<string>)
  fullName: AccoRevit.Addin.Utils.MissingResourcesLoader.LoadTemplatesAndSchedulesFromContainer(AccoRevit.Addin.Enums.ContainerSource, System.Collections.Generic.ICollection<string>, System.Collections.Generic.ICollection<string>)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Copies missing view templates and schedule templates from a container model into the active document.
  remarks: >-
    <p>

    Copy is performed inside a transaction using <xref href="Autodesk.Revit.DB.ElementTransformUtils.CopyElements(Autodesk.Revit.DB.Document%2cSystem.Collections.Generic.ICollection%7bAutodesk.Revit.DB.ElementId%7d%2cAutodesk.Revit.DB.Document%2cAutodesk.Revit.DB.Transform%2cAutodesk.Revit.DB.CopyPasteOptions)" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    If the destination document contains non-template schedules with the same names as schedule templates being copied,

    those destination schedules are renamed with an <code>" - old"</code> suffix prior to copying to avoid name collisions.

    </p>

    <p>

    Any failures are added to an internal error list and can be displayed via <xref href="AccoRevit.Addin.Utils.MissingResourcesLoader.ShowFinalMessages(System.Collections.Generic.ICollection%7bSystem.String%7d%2cSystem.Collections.Generic.ICollection%7bSystem.String%7d%2cSystem.Collections.Generic.ICollection%7bSystem.String%7d%2cSystem.Collections.Generic.ICollection%7bSystem.String%7d)" data-throw-if-not-resolved="false"></xref>.

    </p>
  example: []
  syntax:
    content: public void LoadTemplatesAndSchedulesFromContainer(ContainerSource type, ICollection<string> missingTemplates = null, ICollection<string> missingSchedules = null)
    parameters:
    - id: type
      type: AccoRevit.Addin.Enums.ContainerSource
      description: Which container source to use.
    - id: missingTemplates
      type: System.Collections.Generic.ICollection{System.String}
      description: Names of view templates (non-schedule) to copy.
    - id: missingSchedules
      type: System.Collections.Generic.ICollection{System.String}
      description: Names of schedule templates to copy.
    content.vb: Public Sub LoadTemplatesAndSchedulesFromContainer(type As ContainerSource, missingTemplates As ICollection(Of String) = Nothing, missingSchedules As ICollection(Of String) = Nothing)
  overload: AccoRevit.Addin.Utils.MissingResourcesLoader.LoadTemplatesAndSchedulesFromContainer*
  nameWithType.vb: MissingResourcesLoader.LoadTemplatesAndSchedulesFromContainer(ContainerSource, ICollection(Of String), ICollection(Of String))
  fullName.vb: AccoRevit.Addin.Utils.MissingResourcesLoader.LoadTemplatesAndSchedulesFromContainer(AccoRevit.Addin.Enums.ContainerSource, System.Collections.Generic.ICollection(Of String), System.Collections.Generic.ICollection(Of String))
  name.vb: LoadTemplatesAndSchedulesFromContainer(ContainerSource, ICollection(Of String), ICollection(Of String))

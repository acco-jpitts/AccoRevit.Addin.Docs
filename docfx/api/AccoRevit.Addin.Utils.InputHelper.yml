- uid: AccoRevit.Addin.Utils.InputHelper.GetTradeInfo(System.Collections.Generic.List{AccoRevit.Addin.Enums.Trade})
  commentId: M:AccoRevit.Addin.Utils.InputHelper.GetTradeInfo(System.Collections.Generic.List{AccoRevit.Addin.Enums.Trade})
  id: GetTradeInfo(System.Collections.Generic.List{AccoRevit.Addin.Enums.Trade})
  parent: AccoRevit.Addin.Utils.InputHelper
  langs:
  - csharp
  - vb
  name: GetTradeInfo(List<Trade>)
  nameWithType: InputHelper.GetTradeInfo(List<Trade>)
  fullName: AccoRevit.Addin.Utils.InputHelper.GetTradeInfo(System.Collections.Generic.List<AccoRevit.Addin.Enums.Trade>)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Gets trade information derived from the active document's title.
  remarks: >-
    This method depends on <code>RevitContext.ActiveDocument</code> (pre-2027 build symbol) and will return

    <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> when there is no active document.
  example: []
  syntax:
    content: public static TradeInfo GetTradeInfo(List<Trade> validAbbreviations = null)
    parameters:
    - id: validAbbreviations
      type: System.Collections.Generic.List{AccoRevit.Addin.Enums.Trade}
      description: Optional whitelist of trades to accept (e.g. MP/PL/PP). If provided, the service may reject/return null for others.
    return:
      type: AccoRevit.Addin.Models.TradeInfo
      description: >-
        A <xref href="AccoRevit.Addin.Models.TradeInfo" data-throw-if-not-resolved="false"></xref> instance when a trade can be determined; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>

        (for example when no active document exists or no trade can be inferred).
    content.vb: Public Shared Function GetTradeInfo(validAbbreviations As List(Of Trade) = Nothing) As TradeInfo

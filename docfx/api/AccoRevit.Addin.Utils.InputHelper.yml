  name: InputHelper
  nameWithType: InputHelper
  fullName: AccoRevit.Addin.Utils.InputHelper
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Provides helpers for resolving user/project trade context from the active Revit document.
  remarks: >-
    Uses the configured <xref href="AccoRevit.Addin.Interfaces.ITradeService" data-throw-if-not-resolved="false"></xref> to derive <xref href="AccoRevit.Addin.Models.TradeInfo" data-throw-if-not-resolved="false"></xref> from the active document title.

    Intended for commands that need to filter or behave differently by trade (e.g., MP/PL/PP).
  example: []
  syntax:
    content: public static class InputHelper
    content.vb: Public Module InputHelper

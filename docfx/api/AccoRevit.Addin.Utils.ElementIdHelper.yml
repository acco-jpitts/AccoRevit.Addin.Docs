  fullName: AccoRevit.Addin.Utils.ElementIdHelper
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Provides convenience conversion and helper methods for working with <xref href="Autodesk.Revit.DB.ElementId" data-throw-if-not-resolved="false"></xref> across multiple Revit versions.
  remarks: >-
    <p>

    Revit 2024+ uses 64-bit element ids (<xref href="Autodesk.Revit.DB.ElementId.Value" data-throw-if-not-resolved="false"></xref>), while earlier versions use 32-bit ids

    (<xref href="Autodesk.Revit.DB.ElementId.Value" data-throw-if-not-resolved="false"></xref>). This helper centralizes the conditional compilation required to convert and

    compare ids safely across supported targets.

    </p>
  example: []
  syntax:
    content: public static class ElementIdHelper
    content.vb: Public Module ElementIdHelper

  namespace: AccoRevit.Addin.Utils
  summary: Converts a Revit <xref href="Autodesk.Revit.DB.Category" data-throw-if-not-resolved="false"></xref> to its corresponding <xref href="Autodesk.Revit.DB.BuiltInCategory" data-throw-if-not-resolved="false"></xref> enum value.
  remarks: On Revit 2024+, uses <xref href="Autodesk.Revit.DB.Category.BuiltInCategory" data-throw-if-not-resolved="false"></xref>; otherwise converts from <xref href="Autodesk.Revit.DB.Category.Id" data-throw-if-not-resolved="false"></xref>.

  syntax:
    content: public static BuiltInCategory ToBuiltInCategory(this Category category)
    parameters:
    - id: category
      type: Autodesk.Revit.DB.Category
      description: The category to convert.
    return:
      type: Autodesk.Revit.DB.BuiltInCategory
      description: The <xref href="Autodesk.Revit.DB.BuiltInCategory" data-throw-if-not-resolved="false"></xref> value, or <code>0</code> when <code class="paramref">category</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.

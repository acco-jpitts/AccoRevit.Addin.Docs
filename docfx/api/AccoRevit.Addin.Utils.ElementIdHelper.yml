  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Converts a string representation of an element id to an <xref href="Autodesk.Revit.DB.ElementId" data-throw-if-not-resolved="false"></xref>.
  remarks: Uses invariant culture integer parsing as <xref href="System.Int64" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static ElementId ToElementId(this string id)
    parameters:
    - id: id
      type: System.String
      description: The string containing the id. Supports optional <code>"id:"</code> prefix (case-insensitive) and surrounding whitespace.
    return:
      type: Autodesk.Revit.DB.ElementId
      description: A valid <xref href="Autodesk.Revit.DB.ElementId" data-throw-if-not-resolved="false"></xref> when parsing succeeds; otherwise <xref href="Autodesk.Revit.DB.ElementId.InvalidElementId" data-throw-if-not-resolved="false"></xref>.

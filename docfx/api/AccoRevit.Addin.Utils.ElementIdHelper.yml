- uid: AccoRevit.Addin.Utils.ElementIdHelper.GetTaggedId(Autodesk.Revit.DB.IndependentTag)
  commentId: M:AccoRevit.Addin.Utils.ElementIdHelper.GetTaggedId(Autodesk.Revit.DB.IndependentTag)
  id: GetTaggedId(Autodesk.Revit.DB.IndependentTag)
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.ElementIdHelper
  langs:
  - csharp
  - vb
  name: GetTaggedId(IndependentTag)
  nameWithType: ElementIdHelper.GetTaggedId(IndependentTag)
  fullName: AccoRevit.Addin.Utils.ElementIdHelper.GetTaggedId(Autodesk.Revit.DB.IndependentTag)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Gets the first tagged element id from an <xref href="Autodesk.Revit.DB.IndependentTag" data-throw-if-not-resolved="false"></xref>, supporting both host and linked elements.
  remarks: >-
    <p>

    For Revit 2022+, this reads <xref href="Autodesk.Revit.DB.IndependentTag.GetTaggedElementIds" data-throw-if-not-resolved="false"></xref> and returns the first valid host id,

    falling back to the first valid linked id.

    </p>
  example: []
  syntax:
    content: public static ElementId GetTaggedId(this IndependentTag inTag)
    parameters:
    - id: inTag
      type: Autodesk.Revit.DB.IndependentTag
      description: The tag instance.
    return:
      type: Autodesk.Revit.DB.ElementId
      description: The first non-invalid host or linked element id found; otherwise <xref href="Autodesk.Revit.DB.ElementId.InvalidElementId" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Shared Function GetTaggedId(inTag As IndependentTag) As ElementId
  overload: AccoRevit.Addin.Utils.ElementIdHelper.GetTaggedId*

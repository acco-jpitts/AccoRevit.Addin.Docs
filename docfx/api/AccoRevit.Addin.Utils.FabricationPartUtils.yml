- uid: AccoRevit.Addin.Utils.FabricationPartUtils.MatchConnectorSize(Autodesk.Revit.DB.Connector,Autodesk.Revit.DB.Connector)
  commentId: M:AccoRevit.Addin.Utils.FabricationPartUtils.MatchConnectorSize(Autodesk.Revit.DB.Connector,Autodesk.Revit.DB.Connector)
  id: MatchConnectorSize(Autodesk.Revit.DB.Connector,Autodesk.Revit.DB.Connector)
  parent: AccoRevit.Addin.Utils.FabricationPartUtils
  langs:
  - csharp
  - vb
  name: MatchConnectorSize(Connector, Connector)
  nameWithType: FabricationPartUtils.MatchConnectorSize(Connector, Connector)
  fullName: AccoRevit.Addin.Utils.FabricationPartUtils.MatchConnectorSize(Autodesk.Revit.DB.Connector, Autodesk.Revit.DB.Connector)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Sets the size of <code class="paramref">connFrom</code> to match <code class="paramref">connTo</code> based on connector profile shape.
  remarks: >-
    For rectangular/oval connectors, copies <xref href="Autodesk.Revit.DB.Connector.Width" data-throw-if-not-resolved="false"></xref> and <xref href="Autodesk.Revit.DB.Connector.Height" data-throw-if-not-resolved="false"></xref>.

    For round/invalid/other shapes, copies <xref href="Autodesk.Revit.DB.Connector.Radius" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static void MatchConnectorSize(Connector connFrom, Connector connTo)
    parameters:
    - id: connFrom
      type: Autodesk.Revit.DB.Connector
      description: The connector whose size will be updated.
    - id: connTo
      type: Autodesk.Revit.DB.Connector
      description: The connector providing the target size.
    content.vb: Public Shared Sub MatchConnectorSize(connFrom As Connector, connTo As Connector)
  overload: AccoRevit.Addin.Utils.FabricationPartUtils.MatchConnectorSize*
- uid: AccoRevit.Addin.Utils.FabricationPartUtils.FindServiceButton(Autodesk.Revit.DB.FabricationService,System.Int32,System.String)
  commentId: M:AccoRevit.Addin.Utils.FabricationPartUtils.FindServiceButton(Autodesk.Revit.DB.FabricationService,System.Int32,System.String)
  id: FindServiceButton(Autodesk.Revit.DB.FabricationService,System.Int32,System.String)
  parent: AccoRevit.Addin.Utils.FabricationPartUtils
  langs:
  - csharp
  - vb
  name: FindServiceButton(FabricationService, int, string)
  nameWithType: FabricationPartUtils.FindServiceButton(FabricationService, int, string)
  fullName: AccoRevit.Addin.Utils.FabricationPartUtils.FindServiceButton(Autodesk.Revit.DB.FabricationService, int, string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Finds a fabrication service button by exact name match within a palette/group index.
  remarks: >-
    Uses <xref href="Autodesk.Revit.DB.FabricationService.GetButtonCount(System.Int32)" data-throw-if-not-resolved="false"></xref> and <xref href="Autodesk.Revit.DB.FabricationService.GetButton(System.Int32%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref>.

    Validates <code class="paramref">paletteIndex</code> against <code>PaletteCount</code> (2022+) or <code>GroupCount</code> (older).
  example: []
  syntax:
    content: public static FabricationServiceButton FindServiceButton(FabricationService service, int paletteIndex, string buttonName)
    parameters:
    - id: service
      type: Autodesk.Revit.DB.FabricationService
      description: The fabrication service.
    - id: paletteIndex
      type: System.Int32
      description: Palette (Revit 2022+) or group (older) index.
    - id: buttonName
      type: System.String
      description: Button name to match (case-insensitive).
    return:
      type: Autodesk.Revit.DB.FabricationServiceButton
      description: The matching <xref href="Autodesk.Revit.DB.FabricationServiceButton" data-throw-if-not-resolved="false"></xref>, or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> if not found.
    content.vb: Public Shared Function FindServiceButton(service As FabricationService, paletteIndex As Integer, buttonName As String) As FabricationServiceButton

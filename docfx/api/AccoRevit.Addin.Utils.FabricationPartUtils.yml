- uid: AccoRevit.Addin.Utils.FabricationPartUtils.CutInTap(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.Connector,Autodesk.Revit.DB.Connector,System.Double,System.Double,System.Double)
  commentId: M:AccoRevit.Addin.Utils.FabricationPartUtils.CutInTap(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.Connector,Autodesk.Revit.DB.Connector,System.Double,System.Double,System.Double)
  id: CutInTap(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.Connector,Autodesk.Revit.DB.Connector,System.Double,System.Double,System.Double)
  parent: AccoRevit.Addin.Utils.FabricationPartUtils
  langs:
  - csharp
  - vb
  name: CutInTap(Document, Connector, Connector, double, double, double)
  nameWithType: FabricationPartUtils.CutInTap(Document, Connector, Connector, double, double, double)
  fullName: AccoRevit.Addin.Utils.FabricationPartUtils.CutInTap(Autodesk.Revit.DB.Document, Autodesk.Revit.DB.Connector, Autodesk.Revit.DB.Connector, double, double, double)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Places a fabrication branch connector as a tap onto a run connector at the specified offset/rotation/angle.
  remarks: Calls <xref href="Autodesk.Revit.DB.Document.Regenerate" data-throw-if-not-resolved="false"></xref> after placement.
  example: []
  syntax:
    content: public static void CutInTap(Document doc, Connector branchConnector, Connector runConnector, double offset, double rotation = 0, double angle = 0)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The document containing the elements.
    - id: branchConnector
      type: Autodesk.Revit.DB.Connector
      description: The connector representing the branch (tap) connection.
    - id: runConnector
      type: Autodesk.Revit.DB.Connector
      description: The connector representing the run (host) connection.
    - id: offset
      type: System.Double
      description: Offset along the run per Revit API expectation (internal units).
    - id: rotation
      type: System.Double
      description: Optional rotation about the run connection axis (radians).
    - id: angle
      type: System.Double
      description: Optional angle value passed to the placement API (radians).
    content.vb: Public Shared Sub CutInTap(doc As Document, branchConnector As Connector, runConnector As Connector, offset As Double, rotation As Double = 0, angle As Double = 0)
  overload: AccoRevit.Addin.Utils.FabricationPartUtils.CutInTap*
  nameWithType.vb: FabricationPartUtils.CutInTap(Document, Connector, Connector, Double, Double, Double)
  fullName.vb: AccoRevit.Addin.Utils.FabricationPartUtils.CutInTap(Autodesk.Revit.DB.Document, Autodesk.Revit.DB.Connector, Autodesk.Revit.DB.Connector, Double, Double, Double)
  name.vb: CutInTap(Document, Connector, Connector, Double, Double, Double)
- uid: AccoRevit.Addin.Utils.FabricationPartUtils.CutInTee(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.FabricationPart,Autodesk.Revit.DB.Connector,System.Double,System.Double,System.Double)
  commentId: M:AccoRevit.Addin.Utils.FabricationPartUtils.CutInTee(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.FabricationPart,Autodesk.Revit.DB.Connector,System.Double,System.Double,System.Double)
  id: CutInTee(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.FabricationPart,Autodesk.Revit.DB.Connector,System.Double,System.Double,System.Double)
  parent: AccoRevit.Addin.Utils.FabricationPartUtils
  langs:
  - csharp
  - vb
  name: CutInTee(Document, FabricationPart, Connector, double, double, double)
  nameWithType: FabricationPartUtils.CutInTee(Document, FabricationPart, Connector, double, double, double)
  fullName: AccoRevit.Addin.Utils.FabricationPartUtils.CutInTee(Autodesk.Revit.DB.Document, Autodesk.Revit.DB.FabricationPart, Autodesk.Revit.DB.Connector, double, double, double)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Places an existing tee fabrication part as a tap onto a run connector by using the tee's branch connector.
  remarks: >-
    The branch connector is selected as the first connector that is neither primary nor secondary.

    Calls <xref href="Autodesk.Revit.DB.Document.Regenerate" data-throw-if-not-resolved="false"></xref> after placement.
  example: []
  syntax:
    content: public static void CutInTee(Document doc, FabricationPart tee, Connector runConnector, double offset, double rotation = 0, double angle = 0)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The document containing the elements.
    - id: tee
      type: Autodesk.Revit.DB.FabricationPart
      description: The tee fabrication part to be placed.
    - id: runConnector
      type: Autodesk.Revit.DB.Connector
      description: The connector representing the run (host) connection.
    - id: offset
      type: System.Double
      description: Offset along the run per Revit API expectation (internal units).
    - id: rotation
      type: System.Double
      description: Optional rotation about the run connection axis (radians).
    - id: angle
      type: System.Double
      description: Optional angle value passed to the placement API (radians).
    content.vb: Public Shared Sub CutInTee(doc As Document, tee As FabricationPart, runConnector As Connector, offset As Double, rotation As Double = 0, angle As Double = 0)
  overload: AccoRevit.Addin.Utils.FabricationPartUtils.CutInTee*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown when no suitable branch connector can be found on the tee.
  nameWithType.vb: FabricationPartUtils.CutInTee(Document, FabricationPart, Connector, Double, Double, Double)
  fullName.vb: AccoRevit.Addin.Utils.FabricationPartUtils.CutInTee(Autodesk.Revit.DB.Document, Autodesk.Revit.DB.FabricationPart, Autodesk.Revit.DB.Connector, Double, Double, Double)
  name.vb: CutInTee(Document, FabricationPart, Connector, Double, Double, Double)

  commentId: M:AccoRevit.Addin.Utils.FabricationPartUtils.SizeAlignSlopeConnect(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.Connector,Autodesk.Revit.DB.Connector,System.Double,System.Double,Autodesk.Revit.DB.Fabrication.FabricationPartJustification)
  id: SizeAlignSlopeConnect(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.Connector,Autodesk.Revit.DB.Connector,System.Double,System.Double,Autodesk.Revit.DB.Fabrication.FabricationPartJustification)
  parent: AccoRevit.Addin.Utils.FabricationPartUtils

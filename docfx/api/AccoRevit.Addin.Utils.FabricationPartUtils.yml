- uid: AccoRevit.Addin.Utils.FabricationPartUtils.CreateStraightPart(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.FabricationServiceButton,System.Int32,Autodesk.Revit.DB.ElementId,System.Double)
  commentId: M:AccoRevit.Addin.Utils.FabricationPartUtils.CreateStraightPart(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.FabricationServiceButton,System.Int32,Autodesk.Revit.DB.ElementId,System.Double)
  id: CreateStraightPart(Autodesk.Revit.DB.Document,Autodesk.Revit.DB.FabricationServiceButton,System.Int32,Autodesk.Revit.DB.ElementId,System.Double)
  parent: AccoRevit.Addin.Utils.FabricationPartUtils
  langs:
  - csharp
  - vb
  name: CreateStraightPart(Document, FabricationServiceButton, int, ElementId, double)
  nameWithType: FabricationPartUtils.CreateStraightPart(Document, FabricationServiceButton, int, ElementId, double)
  fullName: AccoRevit.Addin.Utils.FabricationPartUtils.CreateStraightPart(Autodesk.Revit.DB.Document, Autodesk.Revit.DB.FabricationServiceButton, int, Autodesk.Revit.DB.ElementId, double)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Creates a straight fabrication part from a service button and sets its length.
  remarks: >-
    <p>

    This method sets the "Length Option" parameter to <code>"Value"</code> and sets the "Length" parameter to <code class="paramref">length</code>.

    Parameter names are string-based and depend on the fabrication content.

    </p>

    <p>

    Calls <xref href="Autodesk.Revit.DB.Document.Regenerate" data-throw-if-not-resolved="false"></xref> after setting parameters to ensure the part updates.

    </p>
  example: []
  syntax:
    content: public static FabricationPart CreateStraightPart(Document doc, FabricationServiceButton button, int condition, ElementId levelId, double length)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The destination document.
    - id: button
      type: Autodesk.Revit.DB.FabricationServiceButton
      description: The fabrication service button used to create the part.
    - id: condition
      type: System.Int32
      description: The fabrication condition index.
    - id: levelId
      type: Autodesk.Revit.DB.ElementId
      description: The level id used for placement.
    - id: length
      type: System.Double
      description: The desired length (in Revit internal units).
    return:
      type: Autodesk.Revit.DB.FabricationPart
      description: The created <xref href="Autodesk.Revit.DB.FabricationPart" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Shared Function CreateStraightPart(doc As Document, button As FabricationServiceButton, condition As Integer, levelId As ElementId, length As Double) As FabricationPart
  overload: AccoRevit.Addin.Utils.FabricationPartUtils.CreateStraightPart*
  nameWithType.vb: FabricationPartUtils.CreateStraightPart(Document, FabricationServiceButton, Integer, ElementId, Double)
  fullName.vb: AccoRevit.Addin.Utils.FabricationPartUtils.CreateStraightPart(Autodesk.Revit.DB.Document, Autodesk.Revit.DB.FabricationServiceButton, Integer, Autodesk.Revit.DB.ElementId, Double)
  name.vb: CreateStraightPart(Document, FabricationServiceButton, Integer, ElementId, Double)

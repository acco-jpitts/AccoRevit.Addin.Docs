  namespace: AccoRevit.Addin.Utils
  summary: Locates the first fabrication service button in the specified palette/group whose name contains the given substring.
  remarks: >-
    Performs a contains match rather than an exact match. Validates <code class="paramref">palette</code> against

    <code>PaletteCount</code> (2022+) or <code>GroupCount</code> (older).
  example: []
  syntax:
    content: public static FabricationServiceButton LocateButton(this FabricationService service, int palette, string name)
    parameters:
    - id: service
      type: Autodesk.Revit.DB.FabricationService
      description: The fabrication service.
    - id: palette
      type: System.Int32
      description: Palette (Revit 2022+) or group (older) index.
    - id: name
      type: System.String
      description: Substring to match against button names (case-insensitive).
    return:
      type: Autodesk.Revit.DB.FabricationServiceButton
      description: The first matching <xref href="Autodesk.Revit.DB.FabricationServiceButton" data-throw-if-not-resolved="false"></xref>, or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> if not found.

  name: SizeAlignSlopeConnect(Document, Connector, Connector, double, double, FabricationPartJustification)
  nameWithType: FabricationPartUtils.SizeAlignSlopeConnect(Document, Connector, Connector, double, double, FabricationPartJustification)
  fullName: AccoRevit.Addin.Utils.FabricationPartUtils.SizeAlignSlopeConnect(Autodesk.Revit.DB.Document, Autodesk.Revit.DB.Connector, Autodesk.Revit.DB.Connector, double, double, Autodesk.Revit.DB.Fabrication.FabricationPartJustification)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Matches connector size, aligns the part by connectors with slope/justification, then connects/couples the connectors.
  remarks: Calls <xref href="Autodesk.Revit.DB.Document.Regenerate" data-throw-if-not-resolved="false"></xref> between each operation to ensure geometry/connector state is current.
  example: []
  syntax:
    content: public static void SizeAlignSlopeConnect(Document doc, Connector connFrom, Connector connTo, double rotation, double slope, FabricationPartJustification justification)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The document containing the elements.
    - id: connFrom
      type: Autodesk.Revit.DB.Connector
      description: The connector to be modified/aligned from.
    - id: connTo
      type: Autodesk.Revit.DB.Connector
      description: The target connector to align and connect to.
    - id: rotation
      type: System.Double
      description: Rotation about the connection axis (radians).
    - id: slope
      type: System.Double
      description: Slope value passed to Revit alignment API (units per Revit API expectation).
    - id: justification
      type: Autodesk.Revit.DB.Fabrication.FabricationPartJustification
      description: Justification used for the sloped alignment.
    content.vb: Public Shared Sub SizeAlignSlopeConnect(doc As Document, connFrom As Connector, connTo As Connector, rotation As Double, slope As Double, justification As FabricationPartJustification)
  overload: AccoRevit.Addin.Utils.FabricationPartUtils.SizeAlignSlopeConnect*

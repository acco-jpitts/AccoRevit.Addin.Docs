  fullName.vb: AccoRevit.Addin.Utils.FabricationPartUtils.SizeAlignSlopeConnect(Autodesk.Revit.DB.Document, Autodesk.Revit.DB.Connector, Autodesk.Revit.DB.Connector, Double, Double, Autodesk.Revit.DB.Fabrication.FabricationPartJustification)

    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">viewModelType</code> is null.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: >-
      Thrown when the ViewModel type has no <xref href="System.Type.FullName" data-throw-if-not-resolved="false"></xref>, when the view type cannot be found, or when the

      resolved type is not a <xref href="System.Windows.Window" data-throw-if-not-resolved="false"></xref>.

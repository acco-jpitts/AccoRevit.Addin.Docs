  namespace: AccoRevit.Addin.Utils
  summary: Gets the WPF view type (<xref href="System.Windows.Window" data-throw-if-not-resolved="false"></xref>) corresponding to the provided ViewModel type.
  remarks: Resolution results are cached. Subsequent calls for the same ViewModel type return the cached mapping.
  example: []
  syntax:
    content: public Type GetViewType(Type viewModelType)
    parameters:
    - id: viewModelType
      type: System.Type
      description: The ViewModel CLR type.
    return:
      type: System.Type
      description: The resolved view type.
    content.vb: Public Function GetViewType(viewModelType As Type) As Type
  overload: AccoRevit.Addin.Utils.ConventionViewLocator.GetViewType*

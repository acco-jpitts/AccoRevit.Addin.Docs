  name: ConventionViewLocator
  nameWithType: ConventionViewLocator
  fullName: AccoRevit.Addin.Utils.ConventionViewLocator
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Resolves a WPF <xref href="System.Windows.Window" data-throw-if-not-resolved="false"></xref> type for a given ViewModel type using a naming/namespace convention.
  remarks: >-
    <p>

    The convention assumes ViewModels live under a <code>.ModelViews.</code> namespace segment and Views live under

    the corresponding <code>.Views.</code> segment, and that ViewModel types end with <code>ViewModel</code> while view types end

    with <code>View</code>. For example:

    </p>

    <p>

    <code>AccoRevit.Addin.ModelViews.FooViewModel</code> → <code>AccoRevit.Addin.Views.FooView</code>.

    </p>

    <p>

    Resolved mappings are cached per ViewModel type using a thread-safe dictionary.

    </p>
  example: []
  syntax:
    content: 'public sealed class ConventionViewLocator : IViewLocator'
    content.vb: Public NotInheritable Class ConventionViewLocator Implements IViewLocator

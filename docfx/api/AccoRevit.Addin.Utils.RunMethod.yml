items:
- uid: AccoRevit.Addin.Utils.RunMethod
  commentId: T:AccoRevit.Addin.Utils.RunMethod
  id: RunMethod
  parent: AccoRevit.Addin.Utils
  children:
  - AccoRevit.Addin.Utils.RunMethod.#ctor
  - AccoRevit.Addin.Utils.RunMethod.ExecuteCommand(System.String,Autodesk.Revit.UI.ExternalCommandData,Autodesk.Revit.DB.ElementSet)
  langs:
  - csharp
  - vb
  name: RunMethod
  nameWithType: RunMethod
  fullName: AccoRevit.Addin.Utils.RunMethod
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Executes <xref href="Nice3point.Revit.Toolkit.External.ExternalCommand" data-throw-if-not-resolved="false"></xref> implementations by name using reflection.
  remarks: >-
    <p>

    This helper scans the current add-in assembly once (lazy) to build a lookup of command type names to their

    <xref href="System.Type" data-throw-if-not-resolved="false"></xref>. Only non-abstract classes derived from <xref href="Nice3point.Revit.Toolkit.External.ExternalCommand" data-throw-if-not-resolved="false"></xref> in the supported namespaces

    are included.

    </p>

    <p>

    The runner instantiates the target command via <xref href="System.Activator.CreateInstance(System.Type)" data-throw-if-not-resolved="false"></xref> and invokes the Revit

    <code>IExternalCommand</code>-style entry point by calling <xref href="Nice3point.Revit.Toolkit.External.ExternalCommand.Execute(Autodesk.Revit.UI.ExternalCommandData%2cSystem.String%40%2cAutodesk.Revit.DB.ElementSet)" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    A shared <xref href="AccoRevit.Addin.Utils.RunMethod.Stopwatch" data-throw-if-not-resolved="false"></xref> is used to measure elapsed duration per invocation. This class is not intended for

    concurrent execution of multiple commands at the same time.

    </p>
  example: []
  syntax:
    content: public class RunMethod
    content.vb: Public Class RunMethod

- uid: AccoRevit.Addin.Utils.RunMethod.ExecuteCommand(System.String,Autodesk.Revit.UI.ExternalCommandData,Autodesk.Revit.DB.ElementSet)
  commentId: M:AccoRevit.Addin.Utils.RunMethod.ExecuteCommand(System.String,Autodesk.Revit.UI.ExternalCommandData,Autodesk.Revit.DB.ElementSet)
  id: ExecuteCommand(System.String,Autodesk.Revit.UI.ExternalCommandData,Autodesk.Revit.DB.ElementSet)
  parent: AccoRevit.Addin.Utils.RunMethod
  langs:
  - csharp
  - vb
  name: ExecuteCommand(string, ExternalCommandData, ElementSet)
  nameWithType: RunMethod.ExecuteCommand(string, ExternalCommandData, ElementSet)
  fullName: AccoRevit.Addin.Utils.RunMethod.ExecuteCommand(string, Autodesk.Revit.UI.ExternalCommandData, Autodesk.Revit.DB.ElementSet)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Executes an add-in command by its type name.
  remarks: >-
    <p>

    If no matching command is found, an error is written to the console/debug output and shown to the user.

    </p>

    <p>

    If the command returns <xref href="Autodesk.Revit.UI.Result.Failed" data-throw-if-not-resolved="false"></xref> with a non-empty message, the message is shown to the user.

    </p>

    <p>

    Elapsed execution time is logged to console/debug output in the <code>finally</code> block.

    </p>
  example: []
  syntax:
    content: public void ExecuteCommand(string commandName, ExternalCommandData commandData, ElementSet elements)
    parameters:
    - id: commandName
      type: System.String
      description: The command key to run. This is matched against the <xref href="System.Type" data-throw-if-not-resolved="false"></xref> of discovered command classes.
    - id: commandData
      type: Autodesk.Revit.UI.ExternalCommandData
      description: Revit command context provided by Revit.
    - id: elements
      type: Autodesk.Revit.DB.ElementSet
      description: Element set passed through to the command.
    content.vb: Public Sub ExecuteCommand(commandName As String, commandData As ExternalCommandData, elements As ElementSet)
  overload: AccoRevit.Addin.Utils.RunMethod.ExecuteCommand*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown when <code class="paramref">commandName</code> is null/empty/whitespace.
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">commandData</code> or <code class="paramref">elements</code> is null.
  nameWithType.vb: RunMethod.ExecuteCommand(String, ExternalCommandData, ElementSet)
  fullName.vb: AccoRevit.Addin.Utils.RunMethod.ExecuteCommand(String, Autodesk.Revit.UI.ExternalCommandData, Autodesk.Revit.DB.ElementSet)
  name.vb: ExecuteCommand(String, ExternalCommandData, ElementSet)

- uid: AccoRevit.Addin.Utils.XmlTagUtils
  commentId: T:AccoRevit.Addin.Utils.XmlTagUtils
  id: XmlTagUtils
  parent: AccoRevit.Addin.Utils
  children:
  - AccoRevit.Addin.Utils.XmlTagUtils.LoadRules(AccoRevit.Addin.Interfaces.IXmlService,System.String,System.String)
  - AccoRevit.Addin.Utils.XmlTagUtils.ParseRules(System.Xml.Linq.XDocument,System.String)
  langs:
  - csharp
  - vb
  name: XmlTagUtils
  nameWithType: XmlTagUtils
  fullName: AccoRevit.Addin.Utils.XmlTagUtils
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Utility methods for reading annotation/tagging rules from the annotation configuration XML.
  remarks: >-
    <p>

    Rules are stored under <code>AnnotationSpecificationData</code> nodes. This helper reads the XML namespace from the document root,

    filters nodes by <code>TagType</code>, and maps values into <xref href="AccoRevit.Addin.Models.AnnotationRule" data-throw-if-not-resolved="false"></xref> instances.

    </p>

    <p>

    Numeric values are parsed using <xref href="System.Globalization.CultureInfo.InvariantCulture" data-throw-if-not-resolved="false"></xref>. Missing or invalid values fall back to defaults

    (e.g., offsets default to 0; placement defaults to <code>AboveCenter</code>).

    </p>
  example: []
  syntax:
    content: public static class XmlTagUtils
    content.vb: Public Module XmlTagUtils
  inheritance:

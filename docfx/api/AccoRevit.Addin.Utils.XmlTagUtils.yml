- uid: AccoRevit.Addin.Utils.XmlTagUtils.ParseRules(System.Xml.Linq.XDocument,System.String)
  commentId: M:AccoRevit.Addin.Utils.XmlTagUtils.ParseRules(System.Xml.Linq.XDocument,System.String)
  id: ParseRules(System.Xml.Linq.XDocument,System.String)
  parent: AccoRevit.Addin.Utils.XmlTagUtils
  langs:
  - csharp
  - vb
  name: ParseRules(XDocument, string)
  nameWithType: XmlTagUtils.ParseRules(XDocument, string)
  fullName: AccoRevit.Addin.Utils.XmlTagUtils.ParseRules(System.Xml.Linq.XDocument, string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Parses annotation rules from an already-loaded XML document for a specific tag type.
  remarks: >-
    <p>

    This method derives the XML namespace from <code class="paramref">xdoc</code>'s root element and uses it to locate

    <code>AnnotationSpecificationData</code> nodes.

    </p>

    <p>

    The family file path is resolved by preferring <code>AnnotationFamilyFilePathValue</code> when present, and falling back to

    <code>AnnotationFamilyFilePath</code>.

    </p>
  example: []
  syntax:
    content: public static List<AnnotationRule> ParseRules(XDocument xdoc, string tagType)
    parameters:
    - id: xdoc
      type: System.Xml.Linq.XDocument
      description: The loaded XML document.
    - id: tagType
      type: System.String
      description: The tag type token to match (case-insensitive).
    return:
      type: System.Collections.Generic.List{AccoRevit.Addin.Models.AnnotationRule}
      description: A list of <xref href="AccoRevit.Addin.Models.AnnotationRule" data-throw-if-not-resolved="false"></xref> entries matching <code class="paramref">tagType</code>; otherwise an empty list.
    content.vb: Public Shared Function ParseRules(xdoc As XDocument, tagType As String) As List(Of AnnotationRule)
  overload: AccoRevit.Addin.Utils.XmlTagUtils.ParseRules*
  nameWithType.vb: XmlTagUtils.ParseRules(XDocument, String)
  fullName.vb: AccoRevit.Addin.Utils.XmlTagUtils.ParseRules(System.Xml.Linq.XDocument, String)
  name.vb: ParseRules(XDocument, String)
- uid: AccoRevit.Addin.Utils.XmlTagUtils.LoadRules(AccoRevit.Addin.Interfaces.IXmlService,System.String,System.String)
  commentId: M:AccoRevit.Addin.Utils.XmlTagUtils.LoadRules(AccoRevit.Addin.Interfaces.IXmlService,System.String,System.String)
  id: LoadRules(AccoRevit.Addin.Interfaces.IXmlService,System.String,System.String)
  parent: AccoRevit.Addin.Utils.XmlTagUtils
  langs:
  - csharp
  - vb
  name: LoadRules(IXmlService, string, string)
  nameWithType: XmlTagUtils.LoadRules(IXmlService, string, string)
  fullName: AccoRevit.Addin.Utils.XmlTagUtils.LoadRules(AccoRevit.Addin.Interfaces.IXmlService, string, string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Loads an annotation configuration XML file and parses rules for a specific tag type.
  remarks: >-
    This method performs a synchronous wait on <xref href="AccoRevit.Addin.Interfaces.IXmlService.LoadXmlAsync(System.String%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>.

    It is intended for use in Revit external commands where synchronous control flow is typical.
  example: []
  syntax:
    content: public static List<AnnotationRule> LoadRules(IXmlService xmlService, string xmlFilePath, string tagType)
    parameters:
    - id: xmlService
      type: AccoRevit.Addin.Interfaces.IXmlService
      description: Service used to load the XML document.
    - id: xmlFilePath
      type: System.String
      description: Path to the XML file to read.
    - id: tagType
      type: System.String
      description: The tag type token to match (case-insensitive).
    return:
      type: System.Collections.Generic.List{AccoRevit.Addin.Models.AnnotationRule}
      description: A list of <xref href="AccoRevit.Addin.Models.AnnotationRule" data-throw-if-not-resolved="false"></xref> entries matching <code class="paramref">tagType</code>; otherwise an empty list.
    content.vb: Public Shared Function LoadRules(xmlService As IXmlService, xmlFilePath As String, tagType As String) As List(Of AnnotationRule)
  overload: AccoRevit.Addin.Utils.XmlTagUtils.LoadRules*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">xmlService</code> is null or <code class="paramref">xmlFilePath</code> is null/empty/whitespace.
  nameWithType.vb: XmlTagUtils.LoadRules(IXmlService, String, String)
  fullName.vb: AccoRevit.Addin.Utils.XmlTagUtils.LoadRules(AccoRevit.Addin.Interfaces.IXmlService, String, String)
  name.vb: LoadRules(IXmlService, String, String)

- uid: AccoRevit.Addin.Utils.FamilyUtils.GetOrLoadFamilySymbol(Autodesk.Revit.DB.Document,System.String,System.String,System.String,System.Boolean,System.Boolean)
  commentId: M:AccoRevit.Addin.Utils.FamilyUtils.GetOrLoadFamilySymbol(Autodesk.Revit.DB.Document,System.String,System.String,System.String,System.Boolean,System.Boolean)
  id: GetOrLoadFamilySymbol(Autodesk.Revit.DB.Document,System.String,System.String,System.String,System.Boolean,System.Boolean)
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.FamilyUtils
  langs:
  - csharp
  - vb
  name: GetOrLoadFamilySymbol(Document, string, string, string, bool, bool)
  nameWithType: FamilyUtils.GetOrLoadFamilySymbol(Document, string, string, string, bool, bool)
  fullName: AccoRevit.Addin.Utils.FamilyUtils.GetOrLoadFamilySymbol(Autodesk.Revit.DB.Document, string, string, string, bool, bool)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: >-
    Gets an existing <xref href="Autodesk.Revit.DB.FamilySymbol" data-throw-if-not-resolved="false"></xref> from the document or loads it from disk if it is not found.

    Ensures the returned symbol is active.
  remarks: >-
    <p>

    ⚠️ Do not call inside an active Transaction.

    This method opens a transaction to load families and/or activate symbols as needed.

    </p>

    <p>

    Parameter names are not used; the method relies on family/type names and the supplied file path.

    </p>
  example: []
  syntax:
    content: public static FamilySymbol GetOrLoadFamilySymbol(this Document doc, string familyName, string familyType, string path, bool showErrors = true, bool useExistingIfFound = true)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The target document. If null, the current active document is used (when available via Revit context).
    - id: familyName
      type: System.String
      description: Family name to find/load.
    - id: familyType
      type: System.String
      description: Optional type name to match. If null/empty, the method treats this as "load all types" and returns the first symbol found.
    - id: path
      type: System.String
      description: Full path to the family <code>.rfa</code> file.
    - id: showErrors
      type: System.Boolean
      description: If true, displays user-facing error messages for missing/failed loads.
    - id: useExistingIfFound
      type: System.Boolean
      description: If true, returns an existing symbol found in the document instead of loading from disk.
    return:
      type: Autodesk.Revit.DB.FamilySymbol
      description: The matching (and activated) <xref href="Autodesk.Revit.DB.FamilySymbol" data-throw-if-not-resolved="false"></xref>, or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> when not found/loaded.
    content.vb: Public Shared Function GetOrLoadFamilySymbol(doc As Document, familyName As String, familyType As String, path As String, showErrors As Boolean = True, useExistingIfFound As Boolean = True) As FamilySymbol
  overload: AccoRevit.Addin.Utils.FamilyUtils.GetOrLoadFamilySymbol*
  nameWithType.vb: FamilyUtils.GetOrLoadFamilySymbol(Document, String, String, String, Boolean, Boolean)
  fullName.vb: AccoRevit.Addin.Utils.FamilyUtils.GetOrLoadFamilySymbol(Autodesk.Revit.DB.Document, String, String, String, Boolean, Boolean)
  name.vb: GetOrLoadFamilySymbol(Document, String, String, String, Boolean, Boolean)
- uid: AccoRevit.Addin.Utils.FamilyUtils.GetOrLoadFamilySymbols(Autodesk.Revit.DB.Document,System.Collections.Generic.List{AccoRevit.Addin.Models.FamilyLoadInfo},System.Boolean,System.Boolean)
  commentId: M:AccoRevit.Addin.Utils.FamilyUtils.GetOrLoadFamilySymbols(Autodesk.Revit.DB.Document,System.Collections.Generic.List{AccoRevit.Addin.Models.FamilyLoadInfo},System.Boolean,System.Boolean)
  id: GetOrLoadFamilySymbols(Autodesk.Revit.DB.Document,System.Collections.Generic.List{AccoRevit.Addin.Models.FamilyLoadInfo},System.Boolean,System.Boolean)
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.FamilyUtils
  langs:
  - csharp
  - vb
  name: GetOrLoadFamilySymbols(Document, List<FamilyLoadInfo>, bool, bool)
  nameWithType: FamilyUtils.GetOrLoadFamilySymbols(Document, List<FamilyLoadInfo>, bool, bool)
  fullName: AccoRevit.Addin.Utils.FamilyUtils.GetOrLoadFamilySymbols(Autodesk.Revit.DB.Document, System.Collections.Generic.List<AccoRevit.Addin.Models.FamilyLoadInfo>, bool, bool)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Loads multiple families (and/or reuses existing symbols) and returns a symbol lookup keyed by <xref href="AccoRevit.Addin.Models.FamilyLoadInfo.Key" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p>

    ⚠️ Do not call inside an active Transaction.

    This method uses a <xref href="Autodesk.Revit.DB.TransactionGroup" data-throw-if-not-resolved="false"></xref> and creates a transaction per family load/activation.

    </p>

    <p>

    When loading all types for a family, the dictionary contains:

    </p>

    <ul><li><code>info.Key</code> mapped to the first loaded symbol.</li><li><code>"FamilyName:TypeName"</code> mapped to each loaded symbol.</li></ul>
  example: []
  syntax:
    content: public static Dictionary<string, FamilySymbol> GetOrLoadFamilySymbols(this Document doc, List<FamilyLoadInfo> familyInfos, bool showErrors = true, bool useExistingIfFound = true)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The target document.
    - id: familyInfos
      type: System.Collections.Generic.List{AccoRevit.Addin.Models.FamilyLoadInfo}
      description: >-
        List of families/types to load. When <xref href="AccoRevit.Addin.Models.FamilyLoadInfo.FamilyType" data-throw-if-not-resolved="false"></xref> is empty, all types are loaded and

        additional keys of the form <code>"FamilyName:TypeName"</code> are populated.
    - id: showErrors
      type: System.Boolean
      description: If true, shows a consolidated warning message for any missing/failed loads.
    - id: useExistingIfFound
      type: System.Boolean
      description: If true, reuses an existing matching symbol instead of loading from disk.
    return:
      type: System.Collections.Generic.Dictionary{System.String,Autodesk.Revit.DB.FamilySymbol}
      description: >-
        A dictionary mapping keys to resolved <xref href="Autodesk.Revit.DB.FamilySymbol" data-throw-if-not-resolved="false"></xref> instances. Values may be null when a family/type

        could not be resolved.
    content.vb: Public Shared Function GetOrLoadFamilySymbols(doc As Document, familyInfos As List(Of FamilyLoadInfo), showErrors As Boolean = True, useExistingIfFound As Boolean = True) As Dictionary(Of String, FamilySymbol)
  overload: AccoRevit.Addin.Utils.FamilyUtils.GetOrLoadFamilySymbols*
  nameWithType.vb: FamilyUtils.GetOrLoadFamilySymbols(Document, List(Of FamilyLoadInfo), Boolean, Boolean)
  fullName.vb: AccoRevit.Addin.Utils.FamilyUtils.GetOrLoadFamilySymbols(Autodesk.Revit.DB.Document, System.Collections.Generic.List(Of AccoRevit.Addin.Models.FamilyLoadInfo), Boolean, Boolean)
  name.vb: GetOrLoadFamilySymbols(Document, List(Of FamilyLoadInfo), Boolean, Boolean)
- uid: AccoRevit.Addin.Utils.FamilyUtils.FindFamilySymbolInDoc(Autodesk.Revit.DB.Document,System.String,System.String)
  commentId: M:AccoRevit.Addin.Utils.FamilyUtils.FindFamilySymbolInDoc(Autodesk.Revit.DB.Document,System.String,System.String)
  id: FindFamilySymbolInDoc(Autodesk.Revit.DB.Document,System.String,System.String)
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.FamilyUtils
  langs:
  - csharp
  - vb
  name: FindFamilySymbolInDoc(Document, string, string)
  nameWithType: FamilyUtils.FindFamilySymbolInDoc(Document, string, string)
  fullName: AccoRevit.Addin.Utils.FamilyUtils.FindFamilySymbolInDoc(Autodesk.Revit.DB.Document, string, string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Finds a <xref href="Autodesk.Revit.DB.FamilySymbol" data-throw-if-not-resolved="false"></xref> already loaded in the document by family name and optional type name.
  remarks: Uses an in-document symbol search (no file IO).
  example: []
  syntax:
    content: public static FamilySymbol FindFamilySymbolInDoc(this Document doc, string familyName, string familyType = null)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The document to search. If null, the current active document is used (when available via Revit context).
    - id: familyName
      type: System.String
      description: Family name to search for.
    - id: familyType
      type: System.String
      description: Optional type name to match. If omitted, the first symbol in the family is returned.
    return:
      type: Autodesk.Revit.DB.FamilySymbol
      description: The matching symbol, or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> if not found.
    content.vb: Public Shared Function FindFamilySymbolInDoc(doc As Document, familyName As String, familyType As String = Nothing) As FamilySymbol
  overload: AccoRevit.Addin.Utils.FamilyUtils.FindFamilySymbolInDoc*
  nameWithType.vb: FamilyUtils.FindFamilySymbolInDoc(Document, String, String)
  fullName.vb: AccoRevit.Addin.Utils.FamilyUtils.FindFamilySymbolInDoc(Autodesk.Revit.DB.Document, String, String)
  name.vb: FindFamilySymbolInDoc(Document, String, String)
- uid: AccoRevit.Addin.Utils.FamilyUtils.GetAllSymbolsForFamily(Autodesk.Revit.DB.Document,System.String,System.String,System.Boolean)
  commentId: M:AccoRevit.Addin.Utils.FamilyUtils.GetAllSymbolsForFamily(Autodesk.Revit.DB.Document,System.String,System.String,System.Boolean)
  id: GetAllSymbolsForFamily(Autodesk.Revit.DB.Document,System.String,System.String,System.Boolean)
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.FamilyUtils
  langs:
  - csharp
  - vb
  name: GetAllSymbolsForFamily(Document, string, string, bool)
  nameWithType: FamilyUtils.GetAllSymbolsForFamily(Document, string, string, bool)
  fullName: AccoRevit.Addin.Utils.FamilyUtils.GetAllSymbolsForFamily(Autodesk.Revit.DB.Document, string, string, bool)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Returns all <xref href="Autodesk.Revit.DB.FamilySymbol" data-throw-if-not-resolved="false"></xref> instances for a family, loading the family from disk if necessary.
  remarks: >-
    ⚠️ Do not call inside an active Transaction.

    This method starts a transaction to load and activate the symbols when loading is required.
  example: []
  syntax:
    content: public static List<FamilySymbol> GetAllSymbolsForFamily(this Document doc, string familyName, string familyPath, bool showErrors = true)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The target document. If null, the current active document is used (when available via Revit context).
    - id: familyName
      type: System.String
      description: Family name to search for/load.
    - id: familyPath
      type: System.String
      description: Full path to the family <code>.rfa</code> file.
    - id: showErrors
      type: System.Boolean
      description: If true, displays user-facing error messages for missing/failed loads.
    return:
      type: System.Collections.Generic.List{Autodesk.Revit.DB.FamilySymbol}
      description: A list of symbols for the family. Returns an empty list when not found/loaded.
    content.vb: Public Shared Function GetAllSymbolsForFamily(doc As Document, familyName As String, familyPath As String, showErrors As Boolean = True) As List(Of FamilySymbol)
  overload: AccoRevit.Addin.Utils.FamilyUtils.GetAllSymbolsForFamily*
  nameWithType.vb: FamilyUtils.GetAllSymbolsForFamily(Document, String, String, Boolean)
  fullName.vb: AccoRevit.Addin.Utils.FamilyUtils.GetAllSymbolsForFamily(Autodesk.Revit.DB.Document, String, String, Boolean)
  name.vb: GetAllSymbolsForFamily(Document, String, String, Boolean)

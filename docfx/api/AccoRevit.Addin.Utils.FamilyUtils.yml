  langs:
  - csharp
  - vb
  name: FamilyUtils
  nameWithType: FamilyUtils
  fullName: AccoRevit.Addin.Utils.FamilyUtils
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Provides helpers for locating and loading Revit families and family symbols (types) from the current document or disk.
  remarks: >-
    <p>

    These utilities centralize common family-loading patterns for add-ins, including:

    </p>

    <ul><li>Reusing already-loaded <xref href="Autodesk.Revit.DB.FamilySymbol" data-throw-if-not-resolved="false"></xref> instances when available.</li><li>Loading a family from an <code>.rfa</code> file using consistent overwrite behavior.</li><li>Activating symbols before returning them for placement.</li></ul>

    <p>

    Several public methods start their own <xref href="Autodesk.Revit.DB.Transaction" data-throw-if-not-resolved="false"></xref> or <xref href="Autodesk.Revit.DB.TransactionGroup" data-throw-if-not-resolved="false"></xref>. Do not call them

    inside an already-active transaction unless you intend to nest transactions appropriately (generally avoid).

    </p>
  example: []
  syntax:
    content: public static class FamilyUtils
    content.vb: Public Module FamilyUtils

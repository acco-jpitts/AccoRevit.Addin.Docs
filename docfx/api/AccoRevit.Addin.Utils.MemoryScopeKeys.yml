- uid: AccoRevit.Addin.Utils.MemoryScopeKeys.ForDocument(Autodesk.Revit.DB.Document)
  commentId: M:AccoRevit.Addin.Utils.MemoryScopeKeys.ForDocument(Autodesk.Revit.DB.Document)
  id: ForDocument(Autodesk.Revit.DB.Document)
  parent: AccoRevit.Addin.Utils.MemoryScopeKeys
  langs:
  - csharp
  - vb
  name: ForDocument(Document)
  nameWithType: MemoryScopeKeys.ForDocument(Document)
  fullName: AccoRevit.Addin.Utils.MemoryScopeKeys.ForDocument(Autodesk.Revit.DB.Document)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Builds a scope key string for the provided Revit <xref href="Autodesk.Revit.DB.Document" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Precedence order:


    <ol><li>Workshared central model path (<code>central:</code>).</li><li>Cloud model path (<code>cloud:</code>).</li><li>Saved family document path (<code>family:</code>).</li><li>Saved project document path (<code>project:</code>).</li><li>Unsaved family/project fallback based on <xref href="Autodesk.Revit.DB.Document.Title" data-throw-if-not-resolved="false"></xref>.</li></ol>


    The user-visible path is derived using <xref href="Autodesk.Revit.DB.ModelPathUtils.ConvertModelPathToUserVisiblePath(Autodesk.Revit.DB.ModelPath)" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static string ForDocument(Document doc)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The document to build a scope key for.
    return:
      type: System.String
      description: A non-empty scope key string. Returns <code>"global"</code> when <code class="paramref">doc</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.
    content.vb: Public Shared Function ForDocument(doc As Document) As String
  overload: AccoRevit.Addin.Utils.MemoryScopeKeys.ForDocument*

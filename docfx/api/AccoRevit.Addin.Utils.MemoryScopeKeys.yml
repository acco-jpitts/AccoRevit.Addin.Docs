- uid: AccoRevit.Addin.Utils.MemoryScopeKeys
  commentId: T:AccoRevit.Addin.Utils.MemoryScopeKeys
  id: MemoryScopeKeys
  parent: AccoRevit.Addin.Utils
  children:
  - AccoRevit.Addin.Utils.MemoryScopeKeys.ForDocument(Autodesk.Revit.DB.Document)
  langs:
  - csharp
  - vb
  name: MemoryScopeKeys
  nameWithType: MemoryScopeKeys
  fullName: AccoRevit.Addin.Utils.MemoryScopeKeys
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Provides stable string keys for scoping persisted UI/state data (for example, user preferences or cached selections).
  remarks: >-
    The generated keys are designed to be:


    <ul><li><b>Stable</b> across sessions where possible (e.g., central/cloud model paths).</li><li><b>Specific</b> to the document to avoid cross-project contamination.</li><li><b>Descriptive</b> via prefixes such as <code>central:</code>, <code>cloud:</code>, <code>project:</code>, <code>family:</code>.</li></ul>


    The method falls back to document path/name/title when more stable identifiers are not available.
  example: []
  syntax:
    content: public static class MemoryScopeKeys
    content.vb: Public Module MemoryScopeKeys

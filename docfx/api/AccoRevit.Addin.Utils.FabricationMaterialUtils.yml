- uid: AccoRevit.Addin.Utils.FabricationMaterialUtils.GetFabricationMaterialNamesByGroup(Autodesk.Revit.DB.Document,System.String)
  commentId: M:AccoRevit.Addin.Utils.FabricationMaterialUtils.GetFabricationMaterialNamesByGroup(Autodesk.Revit.DB.Document,System.String)
  id: GetFabricationMaterialNamesByGroup(Autodesk.Revit.DB.Document,System.String)
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.FabricationMaterialUtils
  langs:
  - csharp
  - vb
  name: GetFabricationMaterialNamesByGroup(Document, string)
  nameWithType: FabricationMaterialUtils.GetFabricationMaterialNamesByGroup(Document, string)
  fullName: AccoRevit.Addin.Utils.FabricationMaterialUtils.GetFabricationMaterialNamesByGroup(Autodesk.Revit.DB.Document, string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Gets fabrication material names that belong to a specific material group.
  remarks: >-
    Group comparison is case-sensitive because it uses <code>==</code> on strings. If you want case-insensitive matching,

    compare using <xref href="System.String.Equals(System.String%2cSystem.String%2cSystem.StringComparison)" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static List<string> GetFabricationMaterialNamesByGroup(this Document doc, string materialGroup)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The active Revit document.
    - id: materialGroup
      type: System.String
      description: The exact material group name to match.
    return:
      type: System.Collections.Generic.List{System.String}
      description: A list of fabrication material names in the specified group.
    content.vb: Public Shared Function GetFabricationMaterialNamesByGroup(doc As Document, materialGroup As String) As List(Of String)
  overload: AccoRevit.Addin.Utils.FabricationMaterialUtils.GetFabricationMaterialNamesByGroup*
  exceptions:
  - type: System.NullReferenceException
    commentId: T:System.NullReferenceException
    description: May occur if the document has no fabrication configuration (<xref href="Autodesk.Revit.DB.FabricationConfiguration.GetFabricationConfiguration(Autodesk.Revit.DB.Document)" data-throw-if-not-resolved="false"></xref> returns null).
  nameWithType.vb: FabricationMaterialUtils.GetFabricationMaterialNamesByGroup(Document, String)

- uid: AccoRevit.Addin.Utils.FabricationMaterialUtils.CleanMaterialName(System.String)
  commentId: M:AccoRevit.Addin.Utils.FabricationMaterialUtils.CleanMaterialName(System.String)
  id: CleanMaterialName(System.String)
  parent: AccoRevit.Addin.Utils.FabricationMaterialUtils
  langs:
  - csharp
  - vb
  name: CleanMaterialName(string)
  nameWithType: FabricationMaterialUtils.CleanMaterialName(string)
  fullName: AccoRevit.Addin.Utils.FabricationMaterialUtils.CleanMaterialName(string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Normalizes a fabrication material name by removing any trailing metadata starting at the first <code>'{'</code>.
  remarks: >-
    Some fabrication material names include suffix metadata in braces (e.g., <code>"Steel {something}"</code>). This helper

    returns <code>"Steel"</code> for matching purposes.
  example: []
  syntax:
    content: public static string CleanMaterialName(string name)
    parameters:
    - id: name
      type: System.String
      description: Raw material name.
    return:
      type: System.String
      description: The cleaned material name, or the original <code class="paramref">name</code> if it is null/empty/whitespace.
    content.vb: Public Shared Function CleanMaterialName(name As String) As String
  overload: AccoRevit.Addin.Utils.FabricationMaterialUtils.CleanMaterialName*
  nameWithType.vb: FabricationMaterialUtils.CleanMaterialName(String)
  fullName.vb: AccoRevit.Addin.Utils.FabricationMaterialUtils.CleanMaterialName(String)
  name.vb: CleanMaterialName(String)
- uid: AccoRevit.Addin.Utils.FabricationMaterialUtils.GetFabricationMaterialDictionary(Autodesk.Revit.DB.Document,System.String[])
  commentId: M:AccoRevit.Addin.Utils.FabricationMaterialUtils.GetFabricationMaterialDictionary(Autodesk.Revit.DB.Document,System.String[])
  id: GetFabricationMaterialDictionary(Autodesk.Revit.DB.Document,System.String[])
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.FabricationMaterialUtils
  langs:
  - csharp
  - vb
  name: GetFabricationMaterialDictionary(Document, string[])
  nameWithType: FabricationMaterialUtils.GetFabricationMaterialDictionary(Document, string[])
  fullName: AccoRevit.Addin.Utils.FabricationMaterialUtils.GetFabricationMaterialDictionary(Autodesk.Revit.DB.Document, string[])
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Builds a dictionary mapping fabrication material ids to their display names, optionally constrained to a set of input names.
  remarks: >-
    <p>

    This method first builds a case-insensitive lookup keyed by cleaned material name. If multiple materials share the same

    cleaned name, the first encountered material id/name is used.

    </p>

    <p>

    If one or more requested names cannot be matched, a warning is displayed via <code>CustomMessageBox</code>.

    </p>
  example: []
  syntax:
    content: public static Dictionary<int, string> GetFabricationMaterialDictionary(this Document doc, string[] materialNames = null)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The active Revit document.
    - id: materialNames
      type: System.String[]
      description: >-
        Optional list of material names to match. Matching is performed on the cleaned form of each name

        (see <xref href="AccoRevit.Addin.Utils.FabricationMaterialUtils.CleanMaterialName(System.String)" data-throw-if-not-resolved="false"></xref>), using case-insensitive comparison.
    return:
      type: System.Collections.Generic.Dictionary{System.Int32,System.String}
      description: >-
        <p>If <code class="paramref">materialNames</code> is null/empty: a dictionary of all materials (<code>id → name</code>).</p>

        <p>If provided: a dictionary of matched materials (<code>id → name</code>).</p>
    content.vb: Public Shared Function GetFabricationMaterialDictionary(doc As Document, materialNames As String() = Nothing) As Dictionary(Of Integer, String)
  overload: AccoRevit.Addin.Utils.FabricationMaterialUtils.GetFabricationMaterialDictionary*
  exceptions:
  - type: System.NullReferenceException
    commentId: T:System.NullReferenceException
    description: May occur if the document has no fabrication configuration (<xref href="Autodesk.Revit.DB.FabricationConfiguration.GetFabricationConfiguration(Autodesk.Revit.DB.Document)" data-throw-if-not-resolved="false"></xref> returns null).
  nameWithType.vb: FabricationMaterialUtils.GetFabricationMaterialDictionary(Document, String())
  fullName.vb: AccoRevit.Addin.Utils.FabricationMaterialUtils.GetFabricationMaterialDictionary(Autodesk.Revit.DB.Document, String())
  name.vb: GetFabricationMaterialDictionary(Document, String())

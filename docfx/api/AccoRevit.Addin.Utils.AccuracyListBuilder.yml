- uid: AccoRevit.Addin.Utils.AccuracyListBuilder.Build(Autodesk.Revit.DB.ForgeTypeId)
  commentId: M:AccoRevit.Addin.Utils.AccuracyListBuilder.Build(Autodesk.Revit.DB.ForgeTypeId)
  id: Build(Autodesk.Revit.DB.ForgeTypeId)
  parent: AccoRevit.Addin.Utils.AccuracyListBuilder
  langs:
  - csharp
  - vb
  name: Build(ForgeTypeId)
  nameWithType: AccuracyListBuilder.Build(ForgeTypeId)
  fullName: AccoRevit.Addin.Utils.AccuracyListBuilder.Build(Autodesk.Revit.DB.ForgeTypeId)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Builds a list of valid accuracy values for the specified unit (Revit 2021+ unit API).
  remarks: >-
    Uses <xref href="Autodesk.Revit.DB.FormatOptions.IsValidAccuracy(System.Double)" data-throw-if-not-resolved="false"></xref> to filter candidates.

    Fractional candidates are used only for fractional inch units.
  example: []
  syntax:
    content: public static IReadOnlyList<double> Build(ForgeTypeId unitId)
    parameters:
    - id: unitId
      type: Autodesk.Revit.DB.ForgeTypeId
      description: The unit identifier used to validate and generate candidate accuracies.
    return:
      type: System.Collections.Generic.IReadOnlyList{System.Double}
      description: A sorted list of unique accuracy values that are valid for <xref href="Autodesk.Revit.DB.FormatOptions" data-throw-if-not-resolved="false"></xref> for the given unit.
    content.vb: Public Shared Function Build(unitId As ForgeTypeId) As IReadOnlyList(Of Double)
  overload: AccoRevit.Addin.Utils.AccuracyListBuilder.Build*

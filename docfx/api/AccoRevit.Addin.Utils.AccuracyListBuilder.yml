- uid: AccoRevit.Addin.Utils.AccuracyListBuilder
  commentId: T:AccoRevit.Addin.Utils.AccuracyListBuilder
  id: AccuracyListBuilder
  parent: AccoRevit.Addin.Utils
  children:
  - AccoRevit.Addin.Utils.AccuracyListBuilder.Build(Autodesk.Revit.DB.ForgeTypeId)
  langs:
  - csharp
  - vb
  name: AccuracyListBuilder
  nameWithType: AccuracyListBuilder
  fullName: AccoRevit.Addin.Utils.AccuracyListBuilder
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Builds a sorted list of valid unit accuracy values for Revit <xref href="Autodesk.Revit.DB.FormatOptions" data-throw-if-not-resolved="false"></xref> based on the specified unit.
  remarks: >-
    <p>

    Candidate accuracies are generated from:


    <ul><li>Decimal candidates: 1/2/5 scaled by powers of 10 from 10^-3 through 10^3.</li><li>Fractional length candidates: 1/2, 1/4, ... 1/64 inches (or converted to feet for feet-fractional inches).</li></ul>

    </p>

    <p>

    The final list is rounded to three decimals, de-duplicated, validated against Revit's <xref href="Autodesk.Revit.DB.FormatOptions" data-throw-if-not-resolved="false"></xref>

    accuracy constraints for the given unit, and returned in ascending order.

    </p>

    <p>

    API differences are handled via conditional compilation:

    <code>ForgeTypeId</code>/<code>UnitTypeId</code> on Revit 2021+ and <code>DisplayUnitType</code> on earlier versions.

    </p>
  example: []

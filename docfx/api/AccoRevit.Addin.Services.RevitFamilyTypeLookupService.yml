- uid: AccoRevit.Addin.Services.RevitFamilyTypeLookupService
  commentId: T:AccoRevit.Addin.Services.RevitFamilyTypeLookupService
  id: RevitFamilyTypeLookupService
  parent: AccoRevit.Addin.Services
  children:
  - AccoRevit.Addin.Services.RevitFamilyTypeLookupService.#ctor(Autodesk.Revit.UI.UIApplication)
  - AccoRevit.Addin.Services.RevitFamilyTypeLookupService.GetFamilyTypeNames(System.String)
  langs:
  - csharp
  - vb
  name: RevitFamilyTypeLookupService
  nameWithType: RevitFamilyTypeLookupService
  fullName: AccoRevit.Addin.Services.RevitFamilyTypeLookupService
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Services
  summary: >-
    Provides a cached lookup of type names (<xref href="Autodesk.Revit.DB.FamilySymbol" data-throw-if-not-resolved="false"></xref>) contained in an external

    Revit family file (<code>.rfa</code>) by opening the family document, extracting symbol names, and then closing it.
  remarks: >-
    <p>

    Results are cached per file path to avoid repeatedly opening the same family file, which can be expensive.

    </p>

    <p>

    This service opens the family document using <xref href="Autodesk.Revit.ApplicationServices.Application.OpenDocumentFile(System.String)" data-throw-if-not-resolved="false"></xref>

    and closes it in a <code>finally</code> block. The lookup is read-only and does not modify any documents.

    </p>

    <p>

    If the file is missing, invalid, not a family document, or if any exception occurs while opening/reading/closing,

    this service returns an empty list and caches an empty result for the given path.

    </p>
  example: []
  syntax:
    content: public class RevitFamilyTypeLookupService
    content.vb: Public Class RevitFamilyTypeLookupService

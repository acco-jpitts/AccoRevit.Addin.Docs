- uid: AccoRevit.Addin.Services.RevitFamilyTypeLookupService.GetFamilyTypeNames(System.String)
  commentId: M:AccoRevit.Addin.Services.RevitFamilyTypeLookupService.GetFamilyTypeNames(System.String)
  id: GetFamilyTypeNames(System.String)
  parent: AccoRevit.Addin.Services.RevitFamilyTypeLookupService
  langs:
  - csharp
  - vb
  name: GetFamilyTypeNames(string)
  nameWithType: RevitFamilyTypeLookupService.GetFamilyTypeNames(string)
  fullName: AccoRevit.Addin.Services.RevitFamilyTypeLookupService.GetFamilyTypeNames(string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Services
  summary: Gets the distinct, sorted family type names contained in the specified family file.
  remarks: >-
    The result is cached per file path. Subsequent calls with the same <code class="paramref">familyFilePath</code> will return

    the cached list without opening the family document again.
  example: []
  syntax:
    content: public IReadOnlyList<string> GetFamilyTypeNames(string familyFilePath)
    parameters:
    - id: familyFilePath
      type: System.String
      description: >-
        Full path to a Revit family file (<code>.rfa</code>). If the path is null/empty/whitespace or the file does not exist,

        an empty list is returned.
    return:
      type: System.Collections.Generic.IReadOnlyList{System.String}
      description: >-
        A read-only list of distinct family type names (symbol names) sorted alphabetically (case-insensitive).

        Returns an empty list if the file cannot be opened, is not a family document, or contains no symbols.
    content.vb: Public Function GetFamilyTypeNames(familyFilePath As String) As IReadOnlyList(Of String)

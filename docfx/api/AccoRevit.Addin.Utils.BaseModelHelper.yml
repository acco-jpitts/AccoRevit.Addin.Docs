  namespace: AccoRevit.Addin.Utils
  summary: Parses the current Revit application version number and returns the Revit year (e.g., 2024).
  example: []
  syntax:
    content: protected int GetRevitYear()
    return:
      type: System.Int32
      description: The Revit year derived from the application version number.
    content.vb: Protected Function GetRevitYear() As Integer
  overload: AccoRevit.Addin.Utils.BaseModelHelper.GetRevitYear*

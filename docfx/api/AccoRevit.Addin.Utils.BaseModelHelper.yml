  name: BaseModelHelper
  nameWithType: BaseModelHelper
  fullName: AccoRevit.Addin.Utils.BaseModelHelper
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Base helper for locating and opening version-specific "container" Revit models from a configured folder.
  remarks: >-
    <p>

    Derived types provide the root folder (<xref href="AccoRevit.Addin.Utils.BaseModelHelper.BasePath" data-throw-if-not-resolved="false"></xref>) and the version-derived file naming logic

    (<xref href="AccoRevit.Addin.Utils.BaseModelHelper.FileName" data-throw-if-not-resolved="false"></xref>). This helper can return the resolved file path, reuse an already-open document if present,

    or open the model detached from central.

    </p>

    <p>

    Errors are surfaced via <code>CustomMessageBox</code> and methods return <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> on failure.

    </p>
  example: []
  syntax:
    content: public abstract class BaseModelHelper
    content.vb: Public MustInherit Class BaseModelHelper

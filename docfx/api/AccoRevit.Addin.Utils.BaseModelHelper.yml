- uid: AccoRevit.Addin.Utils.BaseModelHelper.ContainerModelFilePath
  commentId: P:AccoRevit.Addin.Utils.BaseModelHelper.ContainerModelFilePath
  id: ContainerModelFilePath
  parent: AccoRevit.Addin.Utils.BaseModelHelper
  langs:
  - csharp
  - vb
  name: ContainerModelFilePath
  nameWithType: BaseModelHelper.ContainerModelFilePath
  fullName: AccoRevit.Addin.Utils.BaseModelHelper.ContainerModelFilePath
  type: Property
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Gets the resolved full file path to the container model if it exists on disk.
  remarks: >-
    The path is constructed as <code>Path.Combine(BasePath, FileName)</code> and verified using <xref href="System.IO.File.Exists(System.String)" data-throw-if-not-resolved="false"></xref>.

    Exceptions are caught and shown to the user.
  example: []
  syntax:
    content: public string ContainerModelFilePath { get; }
    parameters: []
    return:
      type: System.String
      description: The full file path to the container model, or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> if the file does not exist or an error occurs.
    content.vb: Public ReadOnly Property ContainerModelFilePath As String
  overload: AccoRevit.Addin.Utils.BaseModelHelper.ContainerModelFilePath*

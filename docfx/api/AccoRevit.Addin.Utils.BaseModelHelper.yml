    commentId: T:System.InvalidOperationException
    description: Thrown when the application version cannot be parsed to a year, or the value is below 2020.
- uid: AccoRevit.Addin.Utils.BaseModelHelper.TryGetContainerModelDocument(Autodesk.Revit.UI.UIApplication)
  commentId: M:AccoRevit.Addin.Utils.BaseModelHelper.TryGetContainerModelDocument(Autodesk.Revit.UI.UIApplication)
  id: TryGetContainerModelDocument(Autodesk.Revit.UI.UIApplication)
  parent: AccoRevit.Addin.Utils.BaseModelHelper
  langs:
  - csharp
  - vb
  name: TryGetContainerModelDocument(UIApplication)
  nameWithType: BaseModelHelper.TryGetContainerModelDocument(UIApplication)
  fullName: AccoRevit.Addin.Utils.BaseModelHelper.TryGetContainerModelDocument(Autodesk.Revit.UI.UIApplication)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Attempts to obtain the container model <xref href="Autodesk.Revit.DB.Document" data-throw-if-not-resolved="false"></xref> for the current Revit version.
  remarks: >-
    <p>

    If the model is not open, the method opens it using <xref href="Autodesk.Revit.DB.OpenOptions" data-throw-if-not-resolved="false"></xref> with

    <xref href="Autodesk.Revit.DB.DetachFromCentralOption.DetachAndPreserveWorksets" data-throw-if-not-resolved="false"></xref> to avoid modifying central/workshared state.

    </p>

    <p>

    If the file does not exist on disk, a warning is shown and <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> is returned.

    </p>
  example: []
  syntax:
    content: public Document TryGetContainerModelDocument(UIApplication app)
    parameters:
    - id: app
      type: Autodesk.Revit.UI.UIApplication
      description: The Revit UI application used to query open documents and open the model if needed.
    return:
      type: Autodesk.Revit.DB.Document
      description: An already-open container model document if present; otherwise a newly opened document; or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> on failure.
    content.vb: Public Function TryGetContainerModelDocument(app As UIApplication) As Document
  overload: AccoRevit.Addin.Utils.BaseModelHelper.TryGetContainerModelDocument*
- uid: AccoRevit.Addin.Utils.BaseModelHelper.GetElementsByNames``1(Autodesk.Revit.DB.Document,System.Collections.Generic.IEnumerable{System.String})
  commentId: M:AccoRevit.Addin.Utils.BaseModelHelper.GetElementsByNames``1(Autodesk.Revit.DB.Document,System.Collections.Generic.IEnumerable{System.String})
  id: GetElementsByNames``1(Autodesk.Revit.DB.Document,System.Collections.Generic.IEnumerable{System.String})
  parent: AccoRevit.Addin.Utils.BaseModelHelper
  langs:
  - csharp
  - vb
  name: GetElementsByNames<T>(Document, IEnumerable<string>)
  nameWithType: BaseModelHelper.GetElementsByNames<T>(Document, IEnumerable<string>)
  fullName: AccoRevit.Addin.Utils.BaseModelHelper.GetElementsByNames<T>(Autodesk.Revit.DB.Document, System.Collections.Generic.IEnumerable<string>)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: >-
    Collects instance elements of type <code class="typeparamref">T</code> whose <xref href="Autodesk.Revit.DB.Element.Name" data-throw-if-not-resolved="false"></xref> matches any of the provided names

    (case-insensitive).
  remarks: Uses <xref href="Autodesk.Revit.DB.FilteredElementCollector.WhereElementIsNotElementType" data-throw-if-not-resolved="false"></xref> to exclude element types.
  example: []
  syntax:
    content: 'public static List<T> GetElementsByNames<T>(Document doc, IEnumerable<string> names) where T : Element'
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The Revit document to search.
    - id: names
      type: System.Collections.Generic.IEnumerable{System.String}
      description: Names to match against <xref href="Autodesk.Revit.DB.Element.Name" data-throw-if-not-resolved="false"></xref>.
    typeParameters:
    - id: T
      description: The Revit element class to collect.
    return:
      type: System.Collections.Generic.List{{T}}
      description: A list of matching instance elements; returns an empty list when inputs are null.
    content.vb: Public Shared Function GetElementsByNames(Of T As Element)(doc As Document, names As IEnumerable(Of String)) As List(Of T)
  overload: AccoRevit.Addin.Utils.BaseModelHelper.GetElementsByNames*
  nameWithType.vb: BaseModelHelper.GetElementsByNames(Of T)(Document, IEnumerable(Of String))
  fullName.vb: AccoRevit.Addin.Utils.BaseModelHelper.GetElementsByNames(Of T)(Autodesk.Revit.DB.Document, System.Collections.Generic.IEnumerable(Of String))
  name.vb: GetElementsByNames(Of T)(Document, IEnumerable(Of String))

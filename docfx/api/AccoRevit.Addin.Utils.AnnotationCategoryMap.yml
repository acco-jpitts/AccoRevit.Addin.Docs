    parameters:
    - id: category
      type: System.String
      description: Configuration category token.
    - id: revitCategory
      type: System.String
      description: Mapped Revit category token, if found.
    return:
      type: System.Boolean
      description: <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if a mapping exists; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.

  name: AnnotationCategoryMap
  nameWithType: AnnotationCategoryMap
  fullName: AccoRevit.Addin.Utils.AnnotationCategoryMap
  type: Class
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: >-
    Provides a bidirectional mapping between logical annotation categories used in configuration XML and

    Revit built-in category tokens stored as strings.
  remarks: >-
    <p>

    The annotation configuration uses category identifiers such as <code>MEPFabricationPipework</code>, while Revit APIs

    commonly reference built-in categories such as <code>OST_FabricationPipework</code>. This helper centralizes the mapping

    and offers normalization to keep both fields consistent when one side is missing or outdated.

    </p>

    <p>

    The mappings are case-insensitive.

    </p>

- uid: AccoRevit.Addin.Utils.AnnotationCategoryMap.NormalizePair(System.String@,System.String@)
  commentId: M:AccoRevit.Addin.Utils.AnnotationCategoryMap.NormalizePair(System.String@,System.String@)
  id: NormalizePair(System.String@,System.String@)
  parent: AccoRevit.Addin.Utils.AnnotationCategoryMap
  langs:
  - csharp
  - vb
  name: NormalizePair(ref string, ref string)
  nameWithType: AnnotationCategoryMap.NormalizePair(ref string, ref string)
  fullName: AccoRevit.Addin.Utils.AnnotationCategoryMap.NormalizePair(ref string, ref string)
  type: Method
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Normalizes a category/revitCategory pair so that the fields are consistent when one side can be derived from the other.
  remarks: This method does not attempt fuzzy matching or partial token resolution; only exact dictionary matches are used.
  example: []
  syntax:
    content: public static void NormalizePair(ref string category, ref string revitCategory)
    parameters:
    - id: category
      type: System.String
      description: >-
        Configuration category token. If non-empty and recognized, <code class="paramref">revitCategory</code> is set to the mapped value.

        If empty and <code class="paramref">revitCategory</code> is recognized, <code class="paramref">category</code> is set to the mapped value.
    - id: revitCategory
      type: System.String
      description: Revit category token to normalize alongside <code class="paramref">category</code>.
    content.vb: Public Shared Sub NormalizePair(category As String, revitCategory As String)

  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.ModelViews
  summary: View model representing a single annotation/tag specification row in the annotation configuration editor.
  remarks: >-
    <p>

    Wraps <xref href="AccoRevit.Addin.XmlStructure.AnnotationSpecificationData" data-throw-if-not-resolved="false"></xref> with UI-friendly properties and helper behaviors:


    <ul><li>Maintains a selectable list of family types in <xref href="AccoRevit.Addin.ModelViews.AnnotationSpecificationItemViewModel.AvailableFamilyTypes" data-throw-if-not-resolved="false"></xref>.</li><li>Normalizes and synchronizes <xref href="AccoRevit.Addin.ModelViews.AnnotationSpecificationItemViewModel.Category" data-throw-if-not-resolved="false"></xref> and <xref href="AccoRevit.Addin.ModelViews.AnnotationSpecificationItemViewModel.RevitCategory" data-throw-if-not-resolved="false"></xref> using <xref href="AccoRevit.Addin.Utils.AnnotationCategoryMap" data-throw-if-not-resolved="false"></xref>.</li><li>Provides a computed display string for resolved family paths via <xref href="AccoRevit.Addin.ModelViews.AnnotationSpecificationItemViewModel.ResolvedFamilyPathDisplay" data-throw-if-not-resolved="false"></xref>.</li></ul>

    </p>
  example: []
  syntax:
    content: 'public class AnnotationSpecificationItemViewModel : ViewModelBase, INotifyPropertyChanged, IViewModel'
    content.vb: Public Class AnnotationSpecificationItemViewModel Inherits ViewModelBase Implements INotifyPropertyChanged, IViewModel

  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.ModelViews.Helpers
  summary: >-
    Base class for MVVM view models that provides property change notification, common dialog commands,

    and accessors for the active Revit UI/application context.
  remarks: >-
    <p>

    Implements <xref href="System.ComponentModel.INotifyPropertyChanged" data-throw-if-not-resolved="false"></xref> for WPF binding updates and <xref href="AccoRevit.Addin.ModelViews.Helpers.IViewModel" data-throw-if-not-resolved="false"></xref> for dialog success signaling.

    </p>

    <p>

    The static context properties (<xref href="AccoRevit.Addin.ModelViews.Helpers.ViewModelBase.UiApplication" data-throw-if-not-resolved="false"></xref>, <xref href="AccoRevit.Addin.ModelViews.Helpers.ViewModelBase.UiDocument" data-throw-if-not-resolved="false"></xref>, <xref href="AccoRevit.Addin.ModelViews.Helpers.ViewModelBase.Document" data-throw-if-not-resolved="false"></xref>) are resolved through

    Nice3point Toolkit's context and throw if no active document exists.

    </p>
  example: []
  syntax:
    content: 'public abstract class ViewModelBase : INotifyPropertyChanged, IViewModel'
    content.vb: Public MustInherit Class ViewModelBase Implements INotifyPropertyChanged, IViewModel

- uid: AccoRevit.Addin.Utils.PdfUtils.AddStampToPdfWithFields(System.String,System.String,System.Collections.Generic.Dictionary{System.String,System.String})
  commentId: M:AccoRevit.Addin.Utils.PdfUtils.AddStampToPdfWithFields(System.String,System.String,System.Collections.Generic.Dictionary{System.String,System.String})
  id: AddStampToPdfWithFields(System.String,System.String,System.Collections.Generic.Dictionary{System.String,System.String})
  parent: AccoRevit.Addin.Utils.PdfUtils
  langs:
  - csharp
  - vb
  name: AddStampToPdfWithFields(string, string, Dictionary<string, string>)
  nameWithType: PdfUtils.AddStampToPdfWithFields(string, string, Dictionary<string, string>)
  fullName: AccoRevit.Addin.Utils.PdfUtils.AddStampToPdfWithFields(string, string, System.Collections.Generic.Dictionary<string, string>)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/PdfUtils.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: >-
    Fills AcroForm fields in an existing stamp PDF, flattens them, and overlays the resulting stamp page

    onto every page of the input PDF.
  remarks: >-
    <p>

    The method performs these steps:

    </p>

    <ol><li>Open <code class="paramref">stampPath</code>, set provided field values, then flatten fields into a temp stamp file.</li><li>Open the input PDF and overlay the temp stamp page onto each page.</li><li>Atomically replace the original input file with the stamped output.</li></ol>

    <p>

    The stamp page is copied once into a reusable <xref href="iText.Kernel.Pdf.Xobject.PdfFormXObject" data-throw-if-not-resolved="false"></xref> and reused for all pages

    for performance.

    </p>
  example: []
  syntax:
    content: public static void AddStampToPdfWithFields(string inputPath, string stampPath, Dictionary<string, string> fieldValues)
    parameters:
    - id: inputPath
      type: System.String
      description: Path to the input PDF that will be modified in place.
    - id: stampPath
      type: System.String
      description: Path to a stamp PDF that contains form fields to be filled and flattened.
    - id: fieldValues
      type: System.Collections.Generic.Dictionary{System.String,System.String}
      description: Field-name/value pairs to apply to the stamp PDF prior to flattening. Keys that are null/empty/whitespace are ignored.
    content.vb: Public Shared Sub AddStampToPdfWithFields(inputPath As String, stampPath As String, fieldValues As Dictionary(Of String, String))
  overload: AccoRevit.Addin.Utils.PdfUtils.AddStampToPdfWithFields*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">inputPath</code> or <code class="paramref">stampPath</code> is null/empty/whitespace.
  - type: System.IO.FileNotFoundException
    commentId: T:System.IO.FileNotFoundException
    description: Thrown when <code class="paramref">inputPath</code> or <code class="paramref">stampPath</code> does not exist.
  nameWithType.vb: PdfUtils.AddStampToPdfWithFields(String, String, Dictionary(Of String, String))
  fullName.vb: AccoRevit.Addin.Utils.PdfUtils.AddStampToPdfWithFields(String, String, System.Collections.Generic.Dictionary(Of String, String))
  name.vb: AddStampToPdfWithFields(String, String, Dictionary(Of String, String))
- uid: AccoRevit.Addin.Utils.PdfUtils.AddDynamicStampToPdf(System.String,System.Collections.Generic.Dictionary{System.String,System.String})
  commentId: M:AccoRevit.Addin.Utils.PdfUtils.AddDynamicStampToPdf(System.String,System.Collections.Generic.Dictionary{System.String,System.String})
  id: AddDynamicStampToPdf(System.String,System.Collections.Generic.Dictionary{System.String,System.String})
  parent: AccoRevit.Addin.Utils.PdfUtils
  langs:
  - csharp
  - vb
  name: AddDynamicStampToPdf(string, Dictionary<string, string>)
  nameWithType: PdfUtils.AddDynamicStampToPdf(string, Dictionary<string, string>)
  fullName: AccoRevit.Addin.Utils.PdfUtils.AddDynamicStampToPdf(string, System.Collections.Generic.Dictionary<string, string>)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/PdfUtils.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: >-
    Creates a stamp PDF dynamically by building text form fields from the supplied values, flattens the fields,

    and overlays the resulting stamp page onto every page of the input PDF.
  remarks: >-
    <p>

    The stamp page size is based on the first page of <code class="paramref">inputPath</code> to reduce placement/clipping issues.

    </p>

    <p>

    Field names are made unique by suffixing an incrementing index (e.g., <code>Key_0</code>, <code>Key_1</code>) to avoid collisions

    in the generated AcroForm.

    </p>

    <p>

    The generated fields are flattened into static content before the stamp is applied to the input PDF.

    </p>
  example: []
  syntax:
    content: public static void AddDynamicStampToPdf(string inputPath, Dictionary<string, string> fieldValues)
    parameters:
    - id: inputPath
      type: System.String
      description: Path to the input PDF that will be modified in place.
    - id: fieldValues
      type: System.Collections.Generic.Dictionary{System.String,System.String}
      description: Field-name/value pairs used to create text fields on the stamp. Keys that are null/empty/whitespace are ignored.
    content.vb: Public Shared Sub AddDynamicStampToPdf(inputPath As String, fieldValues As Dictionary(Of String, String))
  overload: AccoRevit.Addin.Utils.PdfUtils.AddDynamicStampToPdf*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">inputPath</code> is null/empty/whitespace.
  - type: System.IO.FileNotFoundException
    commentId: T:System.IO.FileNotFoundException
    description: Thrown when <code class="paramref">inputPath</code> does not exist.
  nameWithType.vb: PdfUtils.AddDynamicStampToPdf(String, Dictionary(Of String, String))
  fullName.vb: AccoRevit.Addin.Utils.PdfUtils.AddDynamicStampToPdf(String, System.Collections.Generic.Dictionary(Of String, String))
  name.vb: AddDynamicStampToPdf(String, Dictionary(Of String, String))

  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/PdfUtils.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: PDF helper utilities for stamping and merging PDFs using iText 7.
  remarks: >-
    <p>

    The stamp methods write to a temporary output file and then atomically replace the original input PDF via

    <xref href="System.IO.File.Replace(System.String%2cSystem.String%2cSystem.String)" data-throw-if-not-resolved="false"></xref> to avoid leaving a partially written file on failures.

    </p>

    <p>

    Temporary files are cleaned up in <code>finally</code> blocks; cleanup failures are intentionally ignored.

    </p>

    <p>

    These methods operate on file paths (not streams) and will throw if required files are missing.

    </p>
  example: []
  syntax:
    content: public static class PdfUtils
    content.vb: Public Module PdfUtils

  namespace: AccoRevit.Addin.Utils
  summary: Merges multiple PDFs into a single output PDF.
  remarks: Each input PDF is opened and its pages are copied into <code class="paramref">outputPath</code> in the same order.
  example: []
  syntax:
    content: public static void MergePdfs(List<string> inputPaths, string outputPath)
    parameters:
    - id: inputPaths
      type: System.Collections.Generic.List{System.String}
      description: Ordered list of input PDF paths to merge.
    - id: outputPath
      type: System.String
      description: Destination path for the merged PDF.
    content.vb: Public Shared Sub MergePdfs(inputPaths As List(Of String), outputPath As String)
  overload: AccoRevit.Addin.Utils.PdfUtils.MergePdfs*
  exceptions:

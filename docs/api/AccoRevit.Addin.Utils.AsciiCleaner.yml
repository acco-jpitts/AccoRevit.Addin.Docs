  name: RemoveNonAscii(string)
  nameWithType: AsciiCleaner.RemoveNonAscii(string)
  fullName: AccoRevit.Addin.Utils.AsciiCleaner.RemoveNonAscii(string)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/AsciiCleaner.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Removes all characters from <code class="paramref">input</code> that are not ASCII letters, digits, period, underscore, or hyphen.
  remarks: >-
    This method uses a regular expression replacement with the pattern <code>[^A-Za-z0-9._-]</code> and replaces matches with

    an empty string.
  example: []
  syntax:
    content: public static string RemoveNonAscii(string input)
    parameters:
    - id: input
      type: System.String
      description: The input string to sanitize.
    return:
      type: System.String
      description: The sanitized string. If <code class="paramref">input</code> is null or empty, the original value is returned.
    content.vb: Public Shared Function RemoveNonAscii(input As String) As String

  namespace: AccoRevit.Addin.Utils
  summary: Provides helpers for sanitizing strings to a restricted ASCII character set.
  remarks: >-
    Intended for producing filesystem- and identifier-friendly strings by stripping characters outside a conservative

    whitelist (<code>A-Z</code>, <code>a-z</code>, <code>0-9</code>, <code>.</code>, <code>_</code>, <code>-</code>).

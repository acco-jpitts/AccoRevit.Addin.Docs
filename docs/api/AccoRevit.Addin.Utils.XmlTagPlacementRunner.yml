  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/XmlTagPlacementRunner.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Executes interactive tag placement driven by an XML annotation configuration.
  remarks: >-
    <p>

    This runner loads an XML file, parses rules for a specific tag type, resolves/loads the required tag families and types,

    activates any inactive family symbols, and then repeatedly prompts the user to pick elements to tag until the selection

    is canceled.

    </p>

    <p>

    Rule matching and placement behavior (category filtering, tag head location computation, leader configuration, etc.)

    is delegated to helpers such as <code>XmlTagUtils</code>, <code>XmlRuleCategorySelectionFilter</code>, and element/rule extension methods

    (e.g., <code>RuleMatchesElement</code>, <code>ComputeTagHeadPoint</code>, <code>TrySetLeader</code>, <code>GetRuleKey</code>).

    </p>
  example: []
  syntax:
    content: public static class XmlTagPlacementRunner
    content.vb: Public Module XmlTagPlacementRunner

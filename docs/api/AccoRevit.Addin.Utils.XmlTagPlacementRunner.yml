  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/XmlTagPlacementRunner.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Runs an interactive, XML-driven tagging session in the active view.
  remarks: >-
    <p>

    Returns a warning result when the active view is not valid for tagging, when the XML file path is missing,

    or when no rules exist for the configured tag type.

    </p>

    <p>

    Returns an error result if the XML cannot be read/parsed.

    </p>
  example: []
  syntax:
    content: public static XmlTagPlacementResult Run(Document doc, UIDocument uidoc, XmlTagCommandConfig config, IXmlService xmlService)
    parameters:
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: The active Revit document.
    - id: uidoc
      type: Autodesk.Revit.UI.UIDocument
      description: The active UI document used for interactive selection.
    - id: config
      type: AccoRevit.Addin.Utils.XmlTagCommandConfig
      description: Command configuration including XML file path, tag type key, transaction name, and selection prompt.
    - id: xmlService
      type: AccoRevit.Addin.Interfaces.IXmlService
      description: Service used to load the XML document.
    return:
      type: AccoRevit.Addin.Utils.XmlTagPlacementResult
      description: A result describing the outcome of the operation (info/warning/error), including a placement summary on success.
    content.vb: Public Shared Function Run(doc As Document, uidoc As UIDocument, config As XmlTagCommandConfig, xmlService As IXmlService) As XmlTagPlacementResult

  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/AnnotationConfigurationService.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Saves an annotation configuration to disk using <xref href="System.Xml.Serialization.XmlSerializer" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p>

    Ensures the destination directory exists before writing.

    </p>

    <p>

    The serialized XML includes the <code>xsd</code> and <code>xsi</code> namespace prefixes and uses:


    <ul><li>Indented formatting with two spaces.</li><li>UTF-8 encoding without a BOM.</li><li>Platform newline normalization via <xref href="System.Xml.NewLineHandling.Replace" data-throw-if-not-resolved="false"></xref>.</li></ul>

    </p>
  example: []
  syntax:
    content: public static void Save(string filePath, AnnotationConfigurationData data)
    parameters:
    - id: filePath
      type: System.String
      description: Destination XML file path.
    - id: data
      type: AccoRevit.Addin.XmlStructure.AnnotationConfigurationData
      description: Configuration data to serialize.
    content.vb: Public Shared Sub Save(filePath As String, data As AnnotationConfigurationData)
  overload: AccoRevit.Addin.Utils.AnnotationConfigurationService.Save*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown when <code class="paramref">filePath</code> is null/empty/whitespace.
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">data</code> is null.
  nameWithType.vb: AnnotationConfigurationService.Save(String, AnnotationConfigurationData)
  fullName.vb: AccoRevit.Addin.Utils.AnnotationConfigurationService.Save(String, AccoRevit.Addin.XmlStructure.AnnotationConfigurationData)
  name.vb: Save(String, AnnotationConfigurationData)

  type: Class
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/AnnotationConfigurationService.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Provides load/save operations for the annotation configuration XML using <xref href="System.Xml.Serialization.XmlSerializer" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p>

    This service reads and writes <xref href="AccoRevit.Addin.XmlStructure.AnnotationConfigurationData" data-throw-if-not-resolved="false"></xref> to an XML file on disk. The XML is formatted

    with indentation and UTF-8 encoding without a BOM to produce stable, source-control-friendly output.

    </p>

    <p>

    The save operation writes directly to the destination path (not via a temporary file). Callers should ensure the file

    is not concurrently accessed in a way that could cause partial writes.

    </p>

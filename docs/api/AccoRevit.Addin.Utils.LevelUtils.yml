  name: GetMostCommonLevelId<T>(List<T>, Document)
  nameWithType: LevelUtils.GetMostCommonLevelId<T>(List<T>, Document)
  fullName: AccoRevit.Addin.Utils.LevelUtils.GetMostCommonLevelId<T>(System.Collections.Generic.List<T>, Autodesk.Revit.DB.Document)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/LevelUtils.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Returns the <xref href="Autodesk.Revit.DB.ElementId" data-throw-if-not-resolved="false"></xref> of the most common level referenced by the supplied elements.
  remarks: >-
    Elements whose <xref href="Autodesk.Revit.DB.Element.LevelId" data-throw-if-not-resolved="false"></xref> is <xref href="Autodesk.Revit.DB.ElementId.InvalidElementId" data-throw-if-not-resolved="false"></xref> (or otherwise invalid per

    <code>IsInvalid()</code>) are ignored.
  example: []
  syntax:
    content: 'public static ElementId GetMostCommonLevelId<T>(List<T> elements, Document doc) where T : Element'
    parameters:
    - id: elements
      type: System.Collections.Generic.List{{T}}
      description: Elements to evaluate. Assembly instances are expanded to their member elements.
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: Document used to resolve assembly member ids to elements.
    typeParameters:
    - id: T
      description: An element type deriving from <xref href="Autodesk.Revit.DB.Element" data-throw-if-not-resolved="false"></xref>.
    return:
      type: Autodesk.Revit.DB.ElementId
      description: >-
        The most frequently occurring <xref href="Autodesk.Revit.DB.Element.LevelId" data-throw-if-not-resolved="false"></xref> among the evaluated elements; otherwise

        <xref href="Autodesk.Revit.DB.ElementId.InvalidElementId" data-throw-if-not-resolved="false"></xref> when no valid level ids are found.
    content.vb: Public Shared Function GetMostCommonLevelId(Of T As Element)(elements As List(Of T), doc As Document) As ElementId
  overload: AccoRevit.Addin.Utils.LevelUtils.GetMostCommonLevelId*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">elements</code> or <code class="paramref">doc</code> is null.
  nameWithType.vb: LevelUtils.GetMostCommonLevelId(Of T)(List(Of T), Document)
  fullName.vb: AccoRevit.Addin.Utils.LevelUtils.GetMostCommonLevelId(Of T)(System.Collections.Generic.List(Of T), Autodesk.Revit.DB.Document)

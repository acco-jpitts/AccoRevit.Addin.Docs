  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Provides utility methods for determining the most frequently associated <xref href="Autodesk.Revit.DB.Level" data-throw-if-not-resolved="false"></xref> for a set of elements.
  remarks: >-
    When an input element is an <xref href="Autodesk.Revit.DB.AssemblyInstance" data-throw-if-not-resolved="false"></xref>, the members of the assembly are evaluated instead of the

    assembly itself, since assemblies may not have a meaningful <xref href="Autodesk.Revit.DB.Element.LevelId" data-throw-if-not-resolved="false"></xref>.

  summary: Returns the most common <xref href="Autodesk.Revit.DB.Level" data-throw-if-not-resolved="false"></xref> referenced by the supplied elements.
  example: []
  syntax:
    content: 'public static Level GetMostCommonLevel<T>(List<T> elements, Document doc) where T : Element'
    parameters:
    - id: elements
      type: System.Collections.Generic.List{{T}}
      description: Elements to evaluate. Assembly instances are expanded to their member elements.
    - id: doc
      type: Autodesk.Revit.DB.Document
      description: Document used to resolve the resulting level id to a <xref href="Autodesk.Revit.DB.Level" data-throw-if-not-resolved="false"></xref>.
    typeParameters:
    - id: T
      description: An element type deriving from <xref href="Autodesk.Revit.DB.Element" data-throw-if-not-resolved="false"></xref>.
    return:
      type: Autodesk.Revit.DB.Level
      description: >-
        The most frequently occurring <xref href="Autodesk.Revit.DB.Level" data-throw-if-not-resolved="false"></xref> among the evaluated elements; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>

        when no valid level ids are found or the level cannot be resolved.
    content.vb: Public Shared Function GetMostCommonLevel(Of T As Element)(elements As List(Of T), doc As Document) As Level

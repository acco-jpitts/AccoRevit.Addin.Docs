  syntax:
    content: public const string ElbowWithSaddleDummyLegTemplate = "WELD\r\n    END-POINT  {weldEndOne.X}  {weldEndOne.Y}  {weldEndOne.Z}  {weldEndOneSize}  BW\r\n    END-POINT  {weldEndTwo.X}  {weldEndTwo.Y}  {weldEndTwo.Z}  {weldEndTwoSize}  BW\r\n    SKEY WF\r\n    ITEM-CODE  {weldItemCode}\r\n    ITEM-DESCRIPTION  {weldProductName}\r\n    FABRICATION-ITEM\r\n    PIPING-SPEC  IPS\r\n    SPOOL-IDENTIFIER  {spoolName}\r\n    UNIQUE-COMPONENT-IDENTIFIER  {weldUniqueId}\r\n    ITEM-ATTRIBUTE0 CID=[{weldItemCustomId}]\r\n    WEIGHT  {weight}\r\nBEND-TEED\r\n    END-POINT  {bendEndTwo.X}  {bendEndTwo.Y}  {bendEndTwo.Z}  {bendEndTwoSize}  BW\r\n    END-POINT  {bendEndOne.X}  {bendEndOne.Y}  {bendEndOne.Z}  {bendEndOneSize}  BW\r\n    CENTRE-POINT  {bendEndOne.X}  {bendEndTwo.Y}  {bendEndOne.Z}\r\n    BRANCH1-POINT  {bendLegConnector.X}  {bendLegConnector.Y}  {bendLegConnector.Z}  {bendLegConnectorSize}  PL\r\n    SKEY MTBW\r\n    ITEM-CODE  {bendItemCode}\r\n    ITEM-DESCRIPTION  {bendProductName}\r\n    FABRICATION-ITEM\r\n    ANGLE  9000\r\n    PIPING-SPEC  {spec}\r\n    SPOOL-IDENTIFIER  {spoolName}\r\n    UNIQUE-COMPONENT-IDENTIFIER  {bendUniqueId}\r\n    ITEM-ATTRIBUTE0 CID=[{bendItemCustomId}]\r\n    WEIGHT  {weight}"
    return:
      type: System.String
    content.vb: Public Const ElbowWithSaddleDummyLegTemplate As String = "WELD" & vbCrLf & "    END-POINT  {weldEndOne.X}  {weldEndOne.Y}  {weldEndOne.Z}  {weldEndOneSize}  BW" & vbCrLf & "    END-POINT  {weldEndTwo.X}  {weldEndTwo.Y}  {weldEndTwo.Z}  {weldEndTwoSize}  BW" & vbCrLf & "    SKEY WF" & vbCrLf & "    ITEM-CODE  {weldItemCode}" & vbCrLf & "    ITEM-DESCRIPTION  {weldProductName}" & vbCrLf & "    FABRICATION-ITEM" & vbCrLf & "    PIPING-SPEC  IPS" & vbCrLf & "    SPOOL-IDENTIFIER  {spoolName}" & vbCrLf & "    UNIQUE-COMPONENT-IDENTIFIER  {weldUniqueId}" & vbCrLf & "    ITEM-ATTRIBUTE0 CID=[{weldItemCustomId}]" & vbCrLf & "    WEIGHT  {weight}" & vbCrLf & "BEND-TEED" & vbCrLf & "    END-POINT  {bendEndTwo.X}  {bendEndTwo.Y}  {bendEndTwo.Z}  {bendEndTwoSize}  BW" & vbCrLf & "    END-POINT  {bendEndOne.X}  {bendEndOne.Y}  {bendEndOne.Z}  {bendEndOneSize}  BW" & vbCrLf & "    CENTRE-POINT  {bendEndOne.X}  {bendEndTwo.Y}  {bendEndOne.Z}" & vbCrLf & "    BRANCH1-POINT  {bendLegConnector.X}  {bendLegConnector.Y}  {bendLegConnector.Z}  {bendLegConnectorSize}  PL" & vbCrLf & "    SKEY MTBW" & vbCrLf & "    ITEM-CODE  {bendItemCode}" & vbCrLf & "    ITEM-DESCRIPTION  {bendProductName}" & vbCrLf & "    FABRICATION-ITEM" & vbCrLf & "    ANGLE  9000" & vbCrLf & "    PIPING-SPEC  {spec}" & vbCrLf & "    SPOOL-IDENTIFIER  {spoolName}" & vbCrLf & "    UNIQUE-COMPONENT-IDENTIFIER  {bendUniqueId}" & vbCrLf & "    ITEM-ATTRIBUTE0 CID=[{bendItemCustomId}]" & vbCrLf & "    WEIGHT  {weight}"

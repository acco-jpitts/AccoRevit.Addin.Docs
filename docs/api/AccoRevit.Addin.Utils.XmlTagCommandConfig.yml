- uid: AccoRevit.Addin.Utils.XmlTagCommandConfig.Create(AccoRevit.Addin.Enums.XmlTagKind,System.String,System.String)
  commentId: M:AccoRevit.Addin.Utils.XmlTagCommandConfig.Create(AccoRevit.Addin.Enums.XmlTagKind,System.String,System.String)
  id: Create(AccoRevit.Addin.Enums.XmlTagKind,System.String,System.String)
  parent: AccoRevit.Addin.Utils.XmlTagCommandConfig
  langs:
  - csharp
  - vb
  name: Create(XmlTagKind, string, string)
  nameWithType: XmlTagCommandConfig.Create(XmlTagKind, string, string)
  fullName: AccoRevit.Addin.Utils.XmlTagCommandConfig.Create(AccoRevit.Addin.Enums.XmlTagKind, string, string)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/XmlTagCommandConfig.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Creates a command configuration for a known XML tag kind.
  remarks: For <xref href="AccoRevit.Addin.Enums.XmlTagKind.Custom" data-throw-if-not-resolved="false"></xref>, this method delegates to <xref href="AccoRevit.Addin.Utils.XmlTagCommandConfig.CreateCustom(System.String%2cSystem.String)" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static XmlTagCommandConfig Create(XmlTagKind tagKind, string customXmlTagType = null, string customDisplayName = null)
    parameters:
    - id: tagKind
      type: AccoRevit.Addin.Enums.XmlTagKind
      description: The tag kind to create configuration for.
    - id: customXmlTagType
      type: System.String
      description: >-
        When <code class="paramref">tagKind</code> is <xref href="AccoRevit.Addin.Enums.XmlTagKind.Custom" data-throw-if-not-resolved="false"></xref>, provides the XML tag type token to use.

        Ignored for other values.
    - id: customDisplayName
      type: System.String
      description: >-
        When <code class="paramref">tagKind</code> is <xref href="AccoRevit.Addin.Enums.XmlTagKind.Custom" data-throw-if-not-resolved="false"></xref>, provides a user-friendly display name used

        in the command title/prompt/transaction name. If omitted, <code class="paramref">customXmlTagType</code> is used.

        Ignored for other values.
    return:
      type: AccoRevit.Addin.Utils.XmlTagCommandConfig
      description: A configured <xref href="AccoRevit.Addin.Utils.XmlTagCommandConfig" data-throw-if-not-resolved="false"></xref> instance.
    content.vb: Public Shared Function Create(tagKind As XmlTagKind, customXmlTagType As String = Nothing, customDisplayName As String = Nothing) As XmlTagCommandConfig
  overload: AccoRevit.Addin.Utils.XmlTagCommandConfig.Create*
  exceptions:
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: Thrown when <code class="paramref">tagKind</code> is not supported.
  nameWithType.vb: XmlTagCommandConfig.Create(XmlTagKind, String, String)
  fullName.vb: AccoRevit.Addin.Utils.XmlTagCommandConfig.Create(AccoRevit.Addin.Enums.XmlTagKind, String, String)
  name.vb: Create(XmlTagKind, String, String)

    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/XmlTagCommandConfig.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Immutable configuration object for an XML-driven tagging command.
  remarks: >-
    <p>

    Encapsulates the XML tag type key used to select rules from the annotation configuration file, along with

    user-facing strings for command title, selection prompt, and transaction naming.

    </p>

    <p>

    Use <xref href="AccoRevit.Addin.Utils.XmlTagCommandConfig.Create(AccoRevit.Addin.Enums.XmlTagKind%2cSystem.String%2cSystem.String)" data-throw-if-not-resolved="false"></xref> to obtain a configuration instance for a known tag kind,

    or <xref href="AccoRevit.Addin.Enums.XmlTagKind.Custom" data-throw-if-not-resolved="false"></xref> to supply a custom tag type and display name.

    </p>
  example: []
  syntax:
    content: public sealed class XmlTagCommandConfig
    content.vb: Public NotInheritable Class XmlTagCommandConfig

- uid: AccoRevit.Addin.Utils.FileDialogHelper
  commentId: T:AccoRevit.Addin.Utils.FileDialogHelper
  id: FileDialogHelper
  parent: AccoRevit.Addin.Utils
  children:
  - AccoRevit.Addin.Utils.FileDialogHelper.PickFile(AccoRevit.Addin.Enums.FileType,System.String)
  - AccoRevit.Addin.Utils.FileDialogHelper.PickFolder(System.String)
  langs:
  - csharp
  - vb
  name: FileDialogHelper
  nameWithType: FileDialogHelper
  fullName: AccoRevit.Addin.Utils.FileDialogHelper
  type: Class
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/FileDialogHelper.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: >-
    Provides file and folder pickers that are safe to use from within Revit, with explicit owner-window handling to ensure

    dialogs appear in front of Revit and do not get lost behind the main application window.
  remarks: >-
    <p>

    <xref href="AccoRevit.Addin.Utils.FileDialogHelper.PickFile(AccoRevit.Addin.Enums.FileType%2cSystem.String)" data-throw-if-not-resolved="false"></xref> primarily uses WPF's <xref href="Microsoft.Win32.SaveFileDialog" data-throw-if-not-resolved="false"></xref> and falls back to

    WinForms <xref href="System.Windows.Forms.SaveFileDialog" data-throw-if-not-resolved="false"></xref> if the WPF dialog fails (commonly due to windowing/owner issues).

    </p>

    <p>

    <xref href="AccoRevit.Addin.Utils.FileDialogHelper.PickFolder(System.String)" data-throw-if-not-resolved="false"></xref> uses <xref href="Microsoft.WindowsAPICodePack.Dialogs.CommonOpenFileDialog" data-throw-if-not-resolved="false"></xref> (Windows API Code Pack) because the WPF file dialogs

    do not provide a first-class folder picker.

    </p>

    <p>

    The owner window/handle is resolved by first attempting the active WPF window, then Revit's main window handle via

    Nice3point Toolkit (when available), and finally Autodesk's <xref href="Autodesk.Windows.ComponentManager.ApplicationWindow" data-throw-if-not-resolved="false"></xref>.

    </p>
  example: []
  syntax:
    content: public static class FileDialogHelper
    content.vb: Public Module FileDialogHelper

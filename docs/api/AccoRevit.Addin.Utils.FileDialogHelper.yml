- uid: AccoRevit.Addin.Utils.FileDialogHelper.PickFile(AccoRevit.Addin.Enums.FileType,System.String)
  commentId: M:AccoRevit.Addin.Utils.FileDialogHelper.PickFile(AccoRevit.Addin.Enums.FileType,System.String)
  id: PickFile(AccoRevit.Addin.Enums.FileType,System.String)
  parent: AccoRevit.Addin.Utils.FileDialogHelper
  langs:
  - csharp
  - vb
  name: PickFile(FileType, string)
  nameWithType: FileDialogHelper.PickFile(FileType, string)
  fullName: AccoRevit.Addin.Utils.FileDialogHelper.PickFile(AccoRevit.Addin.Enums.FileType, string)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/FileDialogHelper.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Prompts the user to select a destination file path for saving, using a file type-specific filter and default extension.
  remarks: >-
    <p>

    Uses <xref href="Microsoft.Win32.SaveFileDialog" data-throw-if-not-resolved="false"></xref> as the primary UI. If an exception is thrown (typically due to

    UI owner/windowing constraints inside Revit), a WinForms <xref href="System.Windows.Forms.SaveFileDialog" data-throw-if-not-resolved="false"></xref> fallback is used.

    </p>

    <p>

    When possible, the dialog is shown with an explicit owner window/handle to keep it modal to Revit.

    </p>
  example: []
  syntax:
    content: public static string PickFile(FileType fileType, string fileName = null)
    parameters:
    - id: fileType
      type: AccoRevit.Addin.Enums.FileType
      description: The file type determining the filter and default extension.
    - id: fileName
      type: System.String
      description: Optional file name (without path) to pre-populate in the dialog. If <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or empty, no default name is applied.
    return:
      type: System.String
      description: The selected full file path if the user completes the dialog; otherwise an empty string.
    content.vb: Public Shared Function PickFile(fileType As FileType, fileName As String = Nothing) As String
  overload: AccoRevit.Addin.Utils.FileDialogHelper.PickFile*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown when <code class="paramref">fileType</code> is not present in the filter map.
  nameWithType.vb: FileDialogHelper.PickFile(FileType, String)
  fullName.vb: AccoRevit.Addin.Utils.FileDialogHelper.PickFile(AccoRevit.Addin.Enums.FileType, String)
  name.vb: PickFile(FileType, String)
- uid: AccoRevit.Addin.Utils.FileDialogHelper.PickFolder(System.String)
  commentId: M:AccoRevit.Addin.Utils.FileDialogHelper.PickFolder(System.String)
  id: PickFolder(System.String)
  parent: AccoRevit.Addin.Utils.FileDialogHelper
  langs:
  - csharp
  - vb
  name: PickFolder(string)
  nameWithType: FileDialogHelper.PickFolder(string)
  fullName: AccoRevit.Addin.Utils.FileDialogHelper.PickFolder(string)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/FileDialogHelper.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Prompts the user to select a destination folder.
  remarks: >-
    Uses <xref href="Microsoft.WindowsAPICodePack.Dialogs.CommonOpenFileDialog" data-throw-if-not-resolved="false"></xref> configured for folder picking. When a Revit owner handle is available, it is used

    to keep the dialog properly parented to Revit.
  example: []
  syntax:
    content: public static string PickFolder(string initialDirectory = null)
    parameters:
    - id: initialDirectory
      type: System.String
      description: Optional initial directory to preselect when the dialog opens. If <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> or empty, the system default is used.
    return:
      type: System.String
      description: The selected folder path if the user completes the dialog; otherwise an empty string.
    content.vb: Public Shared Function PickFolder(initialDirectory As String = Nothing) As String
  overload: AccoRevit.Addin.Utils.FileDialogHelper.PickFolder*
  nameWithType.vb: FileDialogHelper.PickFolder(String)
  fullName.vb: AccoRevit.Addin.Utils.FileDialogHelper.PickFolder(String)
  name.vb: PickFolder(String)

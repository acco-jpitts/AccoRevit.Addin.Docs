  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/ModelViews/AnnotationConfigurationEditorViewModel.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.ModelViews
  summary: Initializes a new editor view model and optionally loads an initial XML configuration file.
  remarks: >-
    On construction, this view model:


    <ul><li>Creates required services and initializes <xref href="AccoRevit.Addin.ModelViews.AnnotationConfigurationEditorViewModel.ItemsView" data-throw-if-not-resolved="false"></xref> sorting and filtering.</li><li>Wires collection/item change tracking for dirty state.</li><li>Loads family names and service types for picklists.</li><li>Loads the file at <code class="paramref">initialXmlPath</code> when provided and present on disk.</li></ul>
  example: []
  syntax:
    content: public AnnotationConfigurationEditorViewModel(string initialXmlPath = null)
    parameters:
    - id: initialXmlPath
      type: System.String
      description: Optional path to an existing XML configuration file to load on startup. If not provided, the editor starts empty.
    content.vb: Public Sub New(initialXmlPath As String = Nothing)

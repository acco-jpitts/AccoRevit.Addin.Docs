    content: 'public class AnnotationConfigurationEditorViewModel : ViewModelBase, INotifyPropertyChanged, IViewModel'
    content.vb: Public Class AnnotationConfigurationEditorViewModel Inherits ViewModelBase Implements INotifyPropertyChanged, IViewModel

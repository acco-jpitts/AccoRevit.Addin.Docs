    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/ModelViews/AnnotationConfigurationEditorViewModel.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.ModelViews
  summary: View model for editing an annotation configuration XML file that defines tag family, type, placement, and filtering rules.
  remarks: >-
    <p>

    Provides a grid-backed collection of <xref href="AccoRevit.Addin.ModelViews.AnnotationSpecificationItemViewModel" data-throw-if-not-resolved="false"></xref> items with search and

    category/tag-type filtering via <xref href="AccoRevit.Addin.ModelViews.AnnotationConfigurationEditorViewModel.ItemsView" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    Integrates with services that discover tag families on disk, query available family types from <code>.rfa</code> files,

    and enumerate fabrication service types from the active Revit document.

    </p>

    <p>

    Tracks unsaved changes using <xref href="AccoRevit.Addin.ModelViews.AnnotationConfigurationEditorViewModel.IsDirty" data-throw-if-not-resolved="false"></xref> and suppresses dirty tracking during bulk load operations.

    </p>
  example: []

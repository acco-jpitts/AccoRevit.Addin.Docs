- uid: AccoRevit.Addin.Utils.ImageUtils.AddIcons(System.Collections.Generic.List{Autodesk.Revit.UI.RibbonItem})
  commentId: M:AccoRevit.Addin.Utils.ImageUtils.AddIcons(System.Collections.Generic.List{Autodesk.Revit.UI.RibbonItem})
  id: AddIcons(System.Collections.Generic.List{Autodesk.Revit.UI.RibbonItem})
  parent: AccoRevit.Addin.Utils.ImageUtils
  langs:
  - csharp
  - vb
  name: AddIcons(List<RibbonItem>)
  nameWithType: ImageUtils.AddIcons(List<RibbonItem>)
  fullName: AccoRevit.Addin.Utils.ImageUtils.AddIcons(System.Collections.Generic.List<Autodesk.Revit.UI.RibbonItem>)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/ImageUtils.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Applies icons, tooltips, and contextual help to a set of ribbon items based on the current theme.
  remarks: >-
    <p>

    Icons are resolved from the add-in AppData folder using naming conventions:

    </p>

    <ul><li><code>{CommandName}16.{theme}.ico</code> for small images.</li><li><code>{CommandName}32.{theme}.ico</code> for large images.</li></ul>

    <p>

    Tooltips are loaded from <code>Resources/Tooltips/tooltips.csv</code> when present.

    Contextual help is applied if <code>Resources/Help/{CommandName}.pdf</code> exists.

    </p>
  example: []
  syntax:
    content: public static void AddIcons(List<RibbonItem> allRibbonItems)
    parameters:
    - id: allRibbonItems
      type: System.Collections.Generic.List{Autodesk.Revit.UI.RibbonItem}
      description: All ribbon items to update.
    content.vb: Public Shared Sub AddIcons(allRibbonItems As List(Of RibbonItem))
  overload: AccoRevit.Addin.Utils.ImageUtils.AddIcons*
  nameWithType.vb: ImageUtils.AddIcons(List(Of RibbonItem))
  fullName.vb: AccoRevit.Addin.Utils.ImageUtils.AddIcons(System.Collections.Generic.List(Of Autodesk.Revit.UI.RibbonItem))
  name.vb: AddIcons(List(Of RibbonItem))
- uid: AccoRevit.Addin.Utils.ImageUtils.ToggleImage(Autodesk.Revit.UI.UIApplication,System.String,System.String)
  commentId: M:AccoRevit.Addin.Utils.ImageUtils.ToggleImage(Autodesk.Revit.UI.UIApplication,System.String,System.String)
  id: ToggleImage(Autodesk.Revit.UI.UIApplication,System.String,System.String)
  isExtensionMethod: true
  parent: AccoRevit.Addin.Utils.ImageUtils
  langs:
  - csharp
  - vb
  name: ToggleImage(UIApplication, string, string)
  nameWithType: ImageUtils.ToggleImage(UIApplication, string, string)
  fullName: AccoRevit.Addin.Utils.ImageUtils.ToggleImage(Autodesk.Revit.UI.UIApplication, string, string)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/ImageUtils.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Updates (toggles) the icon on a ribbon button found on the "Toggle" ribbon tab.
  remarks: >-
    <p>

    This method enumerates ribbon items on the "Toggle" tab and updates the first <xref href="Autodesk.Revit.UI.RibbonButton" data-throw-if-not-resolved="false"></xref>

    whose <xref href="Autodesk.Revit.UI.RibbonItem.Name" data-throw-if-not-resolved="false"></xref> matches <code class="paramref">buttonName</code> (ordinal comparison).

    </p>

    <p>

    The icon is resolved from the user's AppData add-in folder.

    </p>
  example: []
  syntax:
    content: public static void ToggleImage(this UIApplication uiapp, string buttonName, string ico)
    parameters:
    - id: uiapp
      type: Autodesk.Revit.UI.UIApplication
      description: Revit UI application.
    - id: buttonName
      type: System.String
      description: Ribbon button name to match.
    - id: ico
      type: System.String
      description: Base icon name (without theme suffix and extension). The resolved file name will be <code>{ico}.{theme}.ico</code>.
    content.vb: Public Shared Sub ToggleImage(uiapp As UIApplication, buttonName As String, ico As String)
  overload: AccoRevit.Addin.Utils.ImageUtils.ToggleImage*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">uiapp</code> is null.
  nameWithType.vb: ImageUtils.ToggleImage(UIApplication, String, String)
  fullName.vb: AccoRevit.Addin.Utils.ImageUtils.ToggleImage(Autodesk.Revit.UI.UIApplication, String, String)
  name.vb: ToggleImage(UIApplication, String, String)

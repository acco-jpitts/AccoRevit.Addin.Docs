  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Provides utilities for loading ribbon icons and contextual help resources for Revit UI elements.
  remarks: >-
    <p>

    This class supports three icon sources:

    </p>

    <ul><li>WPF Pack URIs for resources embedded as <code>Resource</code> content.</li><li>Embedded manifest resources via <xref href="System.Reflection.Assembly.GetManifestResourceStream(System.String)" data-throw-if-not-resolved="false"></xref>.</li><li>File-based icons in the user's Revit add-in AppData folder (theme-aware naming).</li></ul>

    <p>

    Theme handling uses <code>UIThemeManager</code> on Revit 2024+; otherwise it defaults to light theme.

    </p>

    <p>

    When an icon cannot be resolved, a "Missing32.{theme}.ico" fallback icon is used.

    </p>
  example: []
  syntax:
    content: public static class ImageUtils
    content.vb: Public Module ImageUtils

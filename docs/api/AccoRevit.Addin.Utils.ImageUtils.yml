  commentId: M:AccoRevit.Addin.Utils.ImageUtils.GetEmbeddedImage(System.Reflection.Assembly,System.String)
  id: GetEmbeddedImage(System.Reflection.Assembly,System.String)
  parent: AccoRevit.Addin.Utils.ImageUtils
  langs:
  - csharp
  - vb
  name: GetEmbeddedImage(Assembly, string)
  nameWithType: ImageUtils.GetEmbeddedImage(Assembly, string)
  fullName: AccoRevit.Addin.Utils.ImageUtils.GetEmbeddedImage(System.Reflection.Assembly, string)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/ImageUtils.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Loads an embedded manifest resource image as a <xref href="System.Windows.Media.Imaging.BitmapSource" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    If <code class="paramref">imageFullName</code> is null/empty, this method returns <xref href="AccoRevit.Addin.Utils.ImageUtils.DefaultLargeImage" data-throw-if-not-resolved="false"></xref>.

    Any exceptions are swallowed and also result in returning <xref href="AccoRevit.Addin.Utils.ImageUtils.DefaultLargeImage" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static BitmapSource GetEmbeddedImage(Assembly assembly, string imageFullName)
    parameters:
    - id: assembly
      type: System.Reflection.Assembly
      description: Assembly that contains the embedded resource.
    - id: imageFullName
      type: System.String
      description: Fully-qualified manifest resource name.
    return:
      type: System.Windows.Media.Imaging.BitmapSource
      description: The loaded image if found; otherwise <xref href="AccoRevit.Addin.Utils.ImageUtils.DefaultLargeImage" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Shared Function GetEmbeddedImage(assembly As Assembly, imageFullName As String) As BitmapSource

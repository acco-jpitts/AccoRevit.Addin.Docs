- uid: AccoRevit.Addin.Utils.ImageUtils.LoadPackImage(System.String,System.String)
  commentId: M:AccoRevit.Addin.Utils.ImageUtils.LoadPackImage(System.String,System.String)
  id: LoadPackImage(System.String,System.String)
  parent: AccoRevit.Addin.Utils.ImageUtils
  langs:
  - csharp
  - vb
  name: LoadPackImage(string, string)
  nameWithType: ImageUtils.LoadPackImage(string, string)
  fullName: AccoRevit.Addin.Utils.ImageUtils.LoadPackImage(string, string)
  type: Method
  source:
    href: https://github.com/accoes/CTT_Revit-ACCO_VC_2-0/blob/8f63670cca51ec1c49420b5e120fa5e419d76946/source/AccoRevit.Addin/Utils/ImageUtils.cs
  assemblies:
  - AccoRevit.Addin
  namespace: AccoRevit.Addin.Utils
  summary: Loads a WPF image from a Pack URI pointing to a resource embedded in an assembly.
  remarks: >-
    Uses <xref href="System.Windows.Media.Imaging.BitmapCacheOption.OnLoad" data-throw-if-not-resolved="false"></xref> so the stream can be released immediately.

    The returned image is frozen to allow cross-thread use and reduce UI overhead.
  example: []
  syntax:
    content: public static BitmapImage LoadPackImage(string assemblyName, string relativePath)
    parameters:
    - id: assemblyName
      type: System.String
      description: The short assembly name hosting the resource.
    - id: relativePath
      type: System.String
      description: Relative path to the resource within the assembly.
    return:
      type: System.Windows.Media.Imaging.BitmapImage
      description: A frozen <xref href="System.Windows.Media.Imaging.BitmapImage" data-throw-if-not-resolved="false"></xref> loaded from the Pack URI.
    content.vb: Public Shared Function LoadPackImage(assemblyName As String, relativePath As String) As BitmapImage
  overload: AccoRevit.Addin.Utils.ImageUtils.LoadPackImage*
  nameWithType.vb: ImageUtils.LoadPackImage(String, String)
  fullName.vb: AccoRevit.Addin.Utils.ImageUtils.LoadPackImage(String, String)
  name.vb: LoadPackImage(String, String)
